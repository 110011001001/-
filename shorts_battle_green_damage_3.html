<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shorts Battle – Character Select</title>
<style>
  :root{
    --bg:#05070b;
    --panel:rgba(12,16,24,.88);
    --line:rgba(255,255,255,.08);
    --txt:#eef5ff;
  }
  html, body {
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background: radial-gradient(circle at 50% 20%, #111b2d 0%, #05070b 58%, #020304 100%);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
    color: var(--txt);
    user-select:none;
  }
  #stage {
    position: fixed;
    inset: 0;
    display:grid;
    place-items:center;
  }
  canvas{
    width:min(100vw, calc(100vh * 1.8));
    height:min(100vh, calc(100vw / 1.8));
    max-width:100vw;
    max-height:100vh;
    border-radius:18px;
    box-shadow:0 30px 90px rgba(0,0,0,.55);
    background: linear-gradient(180deg, #121826 0%, #090d14 100%);
  }
  #hud{
    position:fixed;
    left:16px;
    top:16px;
    z-index:4;
    min-width:270px;
    display:grid;
    gap:10px;
    pointer-events:none;
  }
  .barWrap{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:10px 12px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
    backdrop-filter: blur(8px);
  }
  .barLabel{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:13px;
    margin-bottom:6px;
  }
  .bar{
    width:100%;
    height:14px;
    background:rgba(255,255,255,.08);
    border-radius:999px;
    overflow:hidden;
  }
  .fill{
    height:100%;
    width:100%;
    border-radius:999px;
    transition:width .08s linear;
  }
  .playerFill{ background:linear-gradient(90deg, #42d8ff, #9df4ff); }
  .enemyFill{ background:linear-gradient(90deg, #ff516f, #ff9b6e); }

  #tips{
    position:fixed;
    right:16px;
    top:16px;
    z-index:4;
    max-width:300px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:12px 14px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
    backdrop-filter: blur(8px);
    font-size:13px;
    line-height:1.5;
  }
  #menu{
    position:fixed;
    inset:0;
    z-index:10;
    background:rgba(0,0,0,.72);
    display:grid;
    place-items:center;
  }
  .card{
    width:min(92vw, 520px);
    background:rgba(10,14,22,.96);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    padding:26px;
    box-shadow:0 24px 80px rgba(0,0,0,.5);
  }
  .title{
    font-size:30px;
    font-weight:900;
    margin-bottom:8px;
  }
  .sub{
    font-size:14px;
    line-height:1.65;
    opacity:.86;
    margin-bottom:18px;
  }
  .section{
    margin-top:16px;
    font-size:13px;
    opacity:.9;
    font-weight:800;
  }
  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:10px;
  }
  .btn{
    border:0;
    border-radius:16px;
    padding:14px 12px;
    cursor:pointer;
    color:white;
    font-weight:800;
    font-size:15px;
    min-height:62px;
    transition:transform .12s ease, filter .12s ease;
  }
  .btn:hover{ transform:translateY(-1px) scale(1.01); filter:brightness(1.05); }
  .btn.blue{ background:linear-gradient(135deg, #1f90ff, #4adfff); }
  .btn.red{ background:linear-gradient(135deg, #ff3e62, #ff8b56); }
  .btn.green{ background:linear-gradient(135deg, #1dcf7f, #74ff9c); }
  .btn.purple{ background:linear-gradient(135deg, #8b5dff, #cf7eff); }
  .btn.gray{ background:linear-gradient(135deg, #3b4255, #232937); }

  .small{
    font-size:12px;
    opacity:.74;
    margin-top:14px;
    line-height:1.55;
  }
  #overlay{
    position:fixed;
    inset:0;
    display:none;
    place-items:center;
    pointer-events:none;
    z-index:6;
  }
  #bigMsg{
    font-size:clamp(34px, 6vw, 72px);
    font-weight:900;
    letter-spacing:1px;
    text-shadow:0 0 16px rgba(255,255,255,.35), 0 10px 28px rgba(0,0,0,.85);
  }
  .kbd{
    display:inline-block;
    padding:1px 7px;
    border:1px solid rgba(255,255,255,.18);
    border-bottom-width:3px;
    border-radius:7px;
    background:rgba(255,255,255,.06);
    font-size:12px;
    margin:0 2px;
  }
</style>
</head>
<body>
<div id="hud">
  <div class="barWrap">
    <div class="barLabel"><span id="playerLabel">Player</span><span id="playerHpText">100 / 100</span></div>
    <div class="bar"><div id="playerHpBar" class="fill playerFill"></div></div>
  </div>
  <div class="barWrap">
    <div class="barLabel"><span id="enemyLabel">Enemy</span><span id="enemyHpText">100 / 100</span></div>
    <div class="bar"><div id="enemyHpBar" class="fill enemyFill"></div></div>
  </div>
</div>

<div id="tips">
  <div style="font-weight:900;margin-bottom:6px;">操作</div>
  <div>
    <span class="kbd">WASD</span> 移動<br>
    <span class="kbd">Space</span> 射擊<br>
    <span class="kbd">Shift</span> 衝刺<br>
    滑鼠就是你的瞄準方向，敵人每局會隨機選角，四種子彈效果都不同。
  </div>
</div>

<div id="overlay"><div id="bigMsg">GAME OVER</div></div>

<div id="menu">
  <div class="card">
    <div class="title">Shorts Battle</div>
    <div class="sub">
      先選你的角色，敵人每局會隨機選一個。<br>
      紅色子彈會變大且傷害 7，藍色速度更快，綠色會回血，紫色是魔法彈。
    </div>

    <div class="section">選擇你的角色</div>
    <div class="grid">
      <button class="btn blue" data-pick="blue">Blue Mage</button>
      <button class="btn red" data-pick="red">Red Knight</button>
      <button class="btn green" data-pick="green">Green Healer</button>
      <button class="btn purple" data-pick="purple">Purple Mage</button>
    </div>

    <div class="grid" style="margin-top:14px;">
      <button class="btn gray" id="startBtn" disabled>開始遊戲</button>
      <button class="btn gray" id="restartBtn" style="display:none;">重新開始</button>
    </div>

    <div class="small">
      你選的角色會影響血量、射速和衝刺手感。<br>
      敵人會隨機在四種角色中抽一個。
    </div>
  </div>
</div>

<div id="stage">
  <canvas id="c" width="900" height="500"></canvas>
</div>

<script>
(() => {
  const W = 900, H = 500;
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  const menu = document.getElementById('menu');
  const startBtn = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');
  const overlay = document.getElementById('overlay');
  const bigMsg = document.getElementById('bigMsg');

  const playerLabel = document.getElementById('playerLabel');
  const enemyLabel = document.getElementById('enemyLabel');
  const playerHpBar = document.getElementById('playerHpBar');
  const enemyHpBar = document.getElementById('enemyHpBar');
  const playerHpText = document.getElementById('playerHpText');
  const enemyHpText = document.getElementById('enemyHpText');

  const keys = new Set();
  let mouse = { x: W * 0.5, y: H * 0.5 };

  const presets = {
    blue:   { name:'Blue Mage',   color:'#4adfff', hp:100, speed:3.15, shotCd:20, dashPower:9.4, role:'blue' },
    red:    { name:'Red Knight',   color:'#ff516f', hp:110, speed:2.8,  shotCd:24, dashPower:8.8, role:'red' },
    green:  { name:'Green Healer', color:'#5cff8f', hp:105, speed:2.95, shotCd:22, dashPower:8.9, role:'green' },
    purple: { name:'Purple Mage',  color:'#b07cff', hp:95,  speed:3.0,  shotCd:21, dashPower:9.0, role:'purple' }
  };

  let selectedKey = 'blue';
  let running = false;
  let gameOver = false;
  let shake = 0;

  let player, enemy, bullets, particles, trails;

  function rand(min, max){ return Math.random() * (max - min) + min; }
  function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }
  function dist(x1, y1, x2, y2){ return Math.hypot(x1-x2, y1-y2); }
  function circleHit(a, b){ return dist(a.x, a.y, b.x, b.y) <= (a.r + b.r); }

  function makeFighter(preset, x, y, isPlayer){
    return {
      x, y, vx:0, vy:0,
      r:18,
      hp:preset.hp,
      maxHp:preset.hp,
      color:preset.color,
      name:preset.name,
      speedBase:preset.speed,
      shotCdBase:preset.shotCd,
      dashPower:preset.dashPower,
      role:preset.role,
      cd:0,
      dashCd:0,
      dashTime:0,
      invuln:0,
      aiBurst:0,
      isPlayer
    };
  }

  function randEnemyPreset(){
    const keys = Object.keys(presets).filter(k => k !== selectedKey);
    const pool = keys.length ? keys : Object.keys(presets);
    const pick = pool[Math.floor(Math.random() * pool.length)];
    return presets[pick];
  }

  function resetGame(){
    const pPreset = presets[selectedKey];
    const ePreset = randEnemyPreset();

    player = makeFighter(pPreset, 180, H/2, true);
    enemy  = makeFighter(ePreset, W-180, H/2, false);

    bullets = [];
    particles = [];
    trails = [];
    shake = 0;
    gameOver = false;

    playerLabel.textContent = player.name;
    enemyLabel.textContent = enemy.name;
    overlay.style.display = 'none';
  }

  function startGame(){
    menu.style.display = 'none';
    restartBtn.style.display = 'inline-block';
    resetGame();
    running = true;
    requestAnimationFrame(loop);
  }

  function endGame(text){
    gameOver = true;
    bigMsg.textContent = text;
    overlay.style.display = 'grid';
  }

  function addParticles(x, y, color, count=12, power=3, life=22){
    for(let i=0;i<count;i++){
      const a = rand(0, Math.PI*2);
      const s = rand(power*0.25, power);
      particles.push({
        x, y,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s,
        life: life + rand(-5, 5),
        maxLife: life + rand(-5, 5),
        size: rand(1.4, 3.5),
        color
      });
    }
  }

  function shoot(shooter, target, aimPoint = target){
    if(shooter.cd > 0 || gameOver) return;

    const dx = aimPoint.x - shooter.x;
    const dy = aimPoint.y - shooter.y;
    const d = Math.max(0.001, Math.hypot(dx, dy));

    const role = shooter.role;
    let bullet = {
      x: shooter.x + (dx/d) * (shooter.r + 8),
      y: shooter.y + (dy/d) * (shooter.r + 8),
      vx: 0,
      vy: 0,
      r: 5,
      color: shooter.color,
      owner: shooter,
      life: 120,
      bounce: 2,
      damage: 4,
      role
    };

    if(role === 'red'){
      bullet.r = 9;
      bullet.damage = 7;
      bullet.vx = (dx/d) * 5.5;
      bullet.vy = (dy/d) * 5.5;
    } else if(role === 'blue'){
      bullet.r = 5;
      bullet.damage = 4;
      bullet.vx = (dx/d) * 7.4;
      bullet.vy = (dy/d) * 7.4;
    } else if(role === 'green'){
      bullet.r = 6;
      bullet.damage = 3; // 綠色傷害改成 1
      bullet.vx = (dx/d) * 6.1;
      bullet.vy = (dy/d) * 6.1;
      bullet.healAmount = 8;
    } else if(role === 'purple'){
      bullet.r = 6;
      bullet.damage = 5;
      bullet.vx = (dx/d) * 5.8;
      bullet.vy = (dy/d) * 5.8;
      bullet.magic = true;
      bullet.phase = rand(0, Math.PI*2);
    }

    bullets.push(bullet);
    shooter.cd = shooter.shotCdBase;
    addParticles(bullet.x, bullet.y, shooter.color, 6, 2.0, 14);
  }

  function screenShake(amount){
    shake = Math.max(shake, amount);
  }

  function applyExplosion(x, y, color){
    screenShake(8);
    addParticles(x, y, color, 20, 4.8, 26);
  }

  function updatePlayer(){
    const spd = player.dashTime > 0 ? 5.8 : player.speedBase;
    let ax = 0, ay = 0;

    if(keys.has('w')) ay -= 1;
    if(keys.has('s')) ay += 1;
    if(keys.has('a')) ax -= 1;
    if(keys.has('d')) ax += 1;

    const len = Math.max(0.001, Math.hypot(ax, ay));
    if(ax || ay){
      player.vx += (ax/len) * spd * 0.34;
      player.vy += (ay/len) * spd * 0.34;
    }

    if(keys.has('shift') && player.dashCd <= 0 && player.dashTime <= 0){
      const dx = mouse.x - player.x;
      const dy = mouse.y - player.y;
      const d = Math.max(0.001, Math.hypot(dx, dy));
      player.vx += (dx/d) * player.dashPower;
      player.vy += (dy/d) * player.dashPower;
      player.dashTime = 10;
      player.dashCd = 58;
      player.invuln = 10;
      addParticles(player.x, player.y, '#ffffff', 12, 2.8, 16);
      screenShake(4);
    }

    if(keys.has(' ') && player.cd <= 0){
      shoot(player, {x: mouse.x, y: mouse.y});
    }

    if(player.cd > 0) player.cd--;
    if(player.dashCd > 0) player.dashCd--;
    if(player.dashTime > 0) player.dashTime--;
    if(player.invuln > 0) player.invuln--;

    player.vx *= 0.93;
    player.vy *= 0.93;
  }

  function predictAim(shooter, target, bulletSpeed){
    const dx = target.x - shooter.x;
    const dy = target.y - shooter.y;
    const distNow = Math.hypot(dx, dy);
    const leadTime = clamp(distNow / Math.max(0.001, bulletSpeed), 0, 24);
    return {
      x: target.x + (target.vx || 0) * leadTime,
      y: target.y + (target.vy || 0) * leadTime
    };
  }

  function updateAI(){
    const dx = player.x - enemy.x;
    const dy = player.y - enemy.y;
    const d = Math.max(0.001, Math.hypot(dx, dy));

    const bulletSpeed =
      enemy.role === 'red' ? 5.5 :
      enemy.role === 'blue' ? 7.4 :
      enemy.role === 'green' ? 6.1 : 5.8;

    const aim = predictAim(enemy, player, bulletSpeed);

    let moveX = 0, moveY = 0;
    const toPlayerX = dx / d;
    const toPlayerY = dy / d;
    const awayX = -toPlayerX;
    const awayY = -toPlayerY;
    const strafeX = -toPlayerY;
    const strafeY = toPlayerX;
    const orbit = Math.sin(performance.now() / 260 + enemy.x * 0.01) * 0.95;

    const idealRange = enemy.hp < enemy.maxHp * 0.35 ? 270 : 185;
    const rangeError = d - idealRange;

    moveX += toPlayerX * clamp(rangeError / 120, -1, 1) * 0.85;
    moveY += toPlayerY * clamp(rangeError / 120, -1, 1) * 0.85;
    moveX += strafeX * orbit;
    moveY += strafeY * orbit;

    if(d < 120){
      moveX += awayX * 1.4;
      moveY += awayY * 1.4;
    }

    let nearestThreat = null;
    let nearestThreatDist = 9999;
    for(const b of bullets){
      if(b.owner !== player) continue;
      const db = dist(b.x, b.y, enemy.x, enemy.y);
      if(db < nearestThreatDist){
        nearestThreatDist = db;
        nearestThreat = b;
      }
    }

    if(nearestThreat && nearestThreatDist < 170){
      const bv = Math.hypot(nearestThreat.vx, nearestThreat.vy) || 1;
      const dodgeX = -nearestThreat.vy / bv;
      const dodgeY = nearestThreat.vx / bv;
      moveX += dodgeX * 2.2;
      moveY += dodgeY * 2.2;

      if(enemy.dashCd <= 0 && enemy.dashTime <= 0){
        enemy.vx += dodgeX * enemy.dashPower * 0.85;
        enemy.vy += dodgeY * enemy.dashPower * 0.85;
        enemy.dashTime = 8;
        enemy.dashCd = 64;
        enemy.invuln = 8;
        addParticles(enemy.x, enemy.y, enemy.color, 10, 2.4, 16);
      }
    }

    moveX += Math.cos(performance.now() / 370 + enemy.y * 0.02) * 0.12;
    moveY += Math.sin(performance.now() / 410 + enemy.x * 0.02) * 0.12;

    enemy.vx += moveX * 0.36;
    enemy.vy += moveY * 0.36;

    enemy.aiBurst++;
    const shouldShoot =
      enemy.cd <= 0 &&
      (d < 560 || enemy.aiBurst > 24);

    if(shouldShoot){
      shoot(enemy, player, aim);
      enemy.aiBurst = 0;
    }

    if(enemy.cd > 0) enemy.cd--;
    if(enemy.dashCd > 0) enemy.dashCd--;
    if(enemy.dashTime > 0) enemy.dashTime--;
    if(enemy.invuln > 0) enemy.invuln--;

    enemy.vx *= 0.935;
    enemy.vy *= 0.935;
  }

  function updateFighter(f){
    const maxSpeed = f.dashTime > 0 ? 9.4 : 4.2;
    const s = Math.hypot(f.vx, f.vy);
    if(s > maxSpeed){
      f.vx = (f.vx / s) * maxSpeed;
      f.vy = (f.vy / s) * maxSpeed;
    }

    f.x += f.vx;
    f.y += f.vy;

    const pad = f.r + 6;
    if(f.x < pad){ f.x = pad; f.vx *= -0.6; }
    if(f.x > W - pad){ f.x = W - pad; f.vx *= -0.6; }
    if(f.y < pad){ f.y = pad; f.vy *= -0.6; }
    if(f.y > H - pad){ f.y = H - pad; f.vy *= -0.6; }

    f.vx *= 0.985;
    f.vy *= 0.985;
  }

  function updateBullets(){
    for(let i = bullets.length - 1; i >= 0; i--){
      const b = bullets[i];
      b.life--;

      if(b.role === 'purple'){
        b.phase += 0.18;
        const px = -b.vy;
        const py = b.vx;
        b.x += b.vx + px * Math.sin(b.phase) * 0.22;
        b.y += b.vy + py * Math.sin(b.phase) * 0.22;
      } else {
        b.x += b.vx;
        b.y += b.vy;
      }

      trails.push({ x:b.x, y:b.y, color:b.color, life:10, vx:rand(-0.18,0.18), vy:rand(-0.18,0.18) });

      let bounced = false;
      if(b.x <= b.r || b.x >= W - b.r){
        b.vx *= -1;
        b.bounce--;
        bounced = true;
      }
      if(b.y <= b.r || b.y >= H - b.r){
        b.vy *= -1;
        b.bounce--;
        bounced = true;
      }
      if(bounced){
        addParticles(b.x, b.y, b.color, 7, 2.0, 16);
      }

      const victim = b.owner === player ? enemy : player;
      const victimInvuln = victim.invuln > 0;

      if(!victimInvuln && circleHit(b, victim)){
        if(b.role === 'green'){
          const healTarget = b.owner;
          healTarget.hp = Math.min(healTarget.maxHp, healTarget.hp + (b.healAmount || 8));
          addParticles(healTarget.x, healTarget.y, '#5cff8f', 14, 3.2, 18);
        } else {
          victim.hp -= b.damage;
        }

        victim.invuln = 5;
        applyExplosion(b.x, b.y, b.color);
        bullets.splice(i, 1);

        if(victim.hp <= 0){
          endGame(b.owner === player ? 'PLAYER WIN' : 'ENEMY WIN');
        }
        continue;
      }

      if(b.life <= 0 || b.bounce < -1){
        bullets.splice(i, 1);
      }
    }
  }

  function updateParticles(){
    for(let i = particles.length - 1; i >= 0; i--){
      const p = particles[i];
      p.life--;
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.97;
      p.vy *= 0.97;
      if(p.life <= 0) particles.splice(i, 1);
    }
    for(let i = trails.length - 1; i >= 0; i--){
      const t = trails[i];
      t.life--;
      t.x += t.vx;
      t.y += t.vy;
      if(t.life <= 0) trails.splice(i, 1);
    }
  }

  function drawBackground(){
    ctx.save();
    ctx.fillStyle = '#090d14';
    ctx.fillRect(0,0,W,H);

    ctx.globalAlpha = 0.07;
    ctx.strokeStyle = '#cfe0ff';
    for(let x = 0; x <= W; x += 60){
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
    }
    for(let y = 0; y <= H; y += 60){
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    }

    ctx.globalAlpha = 1;
    const gx = W/2 + Math.sin(performance.now()*0.001)*10;
    const gy = H/2 + Math.cos(performance.now()*0.0012)*8;
    const g = ctx.createRadialGradient(gx, gy, 18, gx, gy, 280);
    g.addColorStop(0, 'rgba(80,220,255,.06)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }

  function drawFighter(f){
    ctx.save();
    ctx.shadowColor = f.color;
    ctx.shadowBlur = 22;
    ctx.fillStyle = f.invuln > 0 ? '#ffffff' : f.color;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,.9)';
    ctx.beginPath();
    ctx.arc(f.x + (f === player ? 5 : -5), f.y - 4, 2.7, 0, Math.PI * 2);
    ctx.fill();

    if(f.dashTime > 0){
      ctx.strokeStyle = 'rgba(255,255,255,.45)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.r + 6, 0, Math.PI*2);
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawBullets(){
    for(const b of bullets){
      ctx.save();
      ctx.shadowColor = b.color;
      ctx.shadowBlur = b.role === 'purple' ? 20 : 16;
      ctx.fillStyle = b.color;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawParticles(){
    for(const t of trails){
      const a = Math.max(0, t.life / 10);
      ctx.save();
      ctx.globalAlpha = a * 0.55;
      ctx.fillStyle = t.color;
      ctx.beginPath();
      ctx.arc(t.x, t.y, 2.1, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    for(const p of particles){
      const a = Math.max(0, p.life / p.maxLife);
      ctx.save();
      ctx.globalAlpha = a;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 10;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawUI(){
    const pPct = clamp(player.hp / player.maxHp, 0, 1);
    const ePct = clamp(enemy.hp / enemy.maxHp, 0, 1);
    playerHpBar.style.width = (pPct * 100).toFixed(1) + '%';
    enemyHpBar.style.width = (ePct * 100).toFixed(1) + '%';
    playerHpText.textContent = `${Math.max(0, player.hp)} / ${player.maxHp}`;
    enemyHpText.textContent = `${Math.max(0, enemy.hp)} / ${enemy.maxHp}`;

    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,.72)';
    ctx.font = '14px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Move: WASD   Shoot: Space / Click   Dash: Shift', W/2, H - 14);
    ctx.restore();
  }

  function render(){
    drawBackground();
    drawParticles();
    drawBullets();
    drawFighter(player);
    drawFighter(enemy);
    drawUI();
  }

  function applyShake(){
    if(shake > 0.15){
      ctx.setTransform(1,0,0,1, rand(-shake, shake), rand(-shake, shake));
      shake *= 0.88;
    }else{
      ctx.setTransform(1,0,0,1,0,0);
      shake = 0;
    }
  }

  function loop(){
    if(!running) return;

    if(!gameOver){
      updatePlayer();
      updateAI();
      updateFighter(player);
      updateFighter(enemy);
      updateBullets();
      updateParticles();
    }else{
      updateBullets();
      updateParticles();
    }

    render();
    applyShake();
    requestAnimationFrame(loop);
  }

  document.querySelectorAll('[data-pick]').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedKey = btn.dataset.pick;
      startBtn.disabled = false;
      document.querySelectorAll('[data-pick]').forEach(b => b.style.outline = 'none');
      btn.style.outline = '2px solid rgba(255,255,255,.45)';
    });
  });

  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', () => {
    overlay.style.display = 'none';
    resetGame();
    gameOver = false;
    running = true;
    requestAnimationFrame(loop);
  });

  document.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if(['w','a','s','d','shift',' '].includes(k)) e.preventDefault();
    keys.add(k);
  });
  document.addEventListener('keyup', (e) => {
    const k = e.key.toLowerCase();
    keys.delete(k);
  });

  canvas.addEventListener('mousemove', (e) => {
    const r = canvas.getBoundingClientRect();
    mouse.x = (e.clientX - r.left) * (W / r.width);
    mouse.y = (e.clientY - r.top) * (H / r.height);
  });

  canvas.addEventListener('mousedown', () => {
    if(!gameOver && player.cd <= 0) shoot(player, {x: mouse.x, y: mouse.y});
  });

  resetGame();
  render();
})();
</script>
</body>
</html>
