<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shorts Battle – 終極連線修正版</title>
<style>
  :root{
    --bg:#05070b;
    --panel:rgba(12,16,24,.88);
    --line:rgba(255,255,255,.08);
    --txt:#eef5ff;
  }
  html, body {
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background: radial-gradient(circle at 50% 20%, #111b2d 0%, #05070b 58%, #020304 100%);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
    color: var(--txt);
    user-select:none;
  }
  #stage {
    position: fixed;
    inset: 0;
    display:grid;
    place-items:center;
  }
  canvas{
    width:min(100vw, calc(100vh * 1.8));
    height:min(100vh, calc(100vw / 1.8));
    max-width:100vw;
    max-height:100vh;
    border-radius:18px;
    box-shadow:0 30px 90px rgba(0,0,0,.55);
    background: linear-gradient(180deg, #121826 0%, #090d14 100%);
  }
  #hud{
    position:fixed;
    left:16px;
    top:16px;
    z-index:4;
    min-width:270px;
    display:grid;
    gap:10px;
    pointer-events:none;
  }
  .barWrap{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:10px 12px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
    backdrop-filter: blur(8px);
  }
  .barLabel{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:13px;
    margin-bottom:6px;
  }
  .bar{
    width:100%;
    height:14px;
    background:rgba(255,255,255,.08);
    border-radius:999px;
    overflow:hidden;
  }
  .fill{
    height:100%;
    width:100%;
    border-radius:999px;
    transition:width .08s linear;
  }
  .playerFill{ background:linear-gradient(90deg, #42d8ff, #9df4ff); }
  .enemyFill{ background:linear-gradient(90deg, #ff516f, #ff9b6e); }

  #tips{
    position:fixed;
    right:16px;
    top:16px;
    z-index:4;
    max-width:300px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:12px 14px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
    backdrop-filter: blur(8px);
    font-size:13px;
    line-height:1.5;
  }
  #menu{
    position:fixed;
    inset:0;
    z-index:10;
    background:rgba(0,0,0,.72);
    display:grid;
    place-items:center;
  }
  .card{
    width:min(92vw, 520px);
    background:rgba(10,14,22,.96);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    padding:26px;
    box-shadow:0 24px 80px rgba(0,0,0,.5);
  }
  .title{
    font-size:30px;
    font-weight:900;
    margin-bottom:8px;
  }
  .sub{
    font-size:14px;
    line-height:1.65;
    opacity:.86;
    margin-bottom:16px;
  }
  .section{
    margin-top:14px;
    font-size:13px;
    opacity:.9;
    font-weight:800;
  }
  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:10px;
  }
  .btn{
    border:0;
    border-radius:16px;
    padding:14px 12px;
    cursor:pointer;
    color:white;
    font-weight:800;
    font-size:15px;
    min-height:62px;
    transition:transform .12s ease, filter .12s ease, outline .12s ease;
  }
  .btn:hover:not(:disabled){ transform:translateY(-1px) scale(1.01); filter:brightness(1.05); }
  .btn:disabled{ opacity:0.5; cursor:not-allowed; }
  .btn.blue{ background:linear-gradient(135deg, #1f90ff, #4adfff); }
  .btn.red{ background:linear-gradient(135deg, #ff3e62, #ff8b56); }
  .btn.green{ background:linear-gradient(135deg, #1dcf7f, #74ff9c); }
  .btn.purple{ background:linear-gradient(135deg, #8b5dff, #cf7eff); }
  .btn.gray{ background:linear-gradient(135deg, #3b4255, #232937); }

  .small{
    font-size:12px;
    opacity:.74;
    margin-top:14px;
    line-height:1.55;
  }
  #overlay{
    position:fixed;
    inset:0;
    display:none;
    place-items:center;
    pointer-events:none;
    z-index:6;
  }
  #bigMsg{
    font-size:clamp(34px, 6vw, 72px);
    font-weight:900;
    letter-spacing:1px;
    text-shadow:0 0 16px rgba(255,255,255,.35), 0 10px 28px rgba(0,0,0,.85);
  }
  .kbd{
    display:inline-block;
    padding:1px 7px;
    border:1px solid rgba(255,255,255,.18);
    border-bottom-width:3px;
    border-radius:7px;
    background:rgba(255,255,255,.06);
    font-size:12px;
    margin:0 2px;
  }
  #restartBtn{
    position:fixed;
    left:50%;
    bottom:18px;
    transform:translateX(-50%);
    z-index:12;
    display:none;
    border:0;
    border-radius:16px;
    padding:12px 18px;
    cursor:pointer;
    color:white;
    font-weight:900;
    font-size:15px;
    background:linear-gradient(135deg, #3b4255, #232937);
    box-shadow:0 12px 30px rgba(0,0,0,.35);
  }
  #restartBtn:hover{ filter:brightness(1.06); }
  .modePicked{ outline:2px solid rgba(255,255,255,.45) !important; }
  
  /* PvP UI */
  .room-input {
    padding: 12px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.1);
    background: #121826;
    color: white;
    font-size: 16px;
    text-align: center;
    width: 100%;
    box-sizing: border-box;
  }
  .room-input:focus { outline: 1px solid #4adfff; }
  #lobbyStatus {
    display: none;
    margin-top: 14px;
    background: rgba(255,255,255,0.06);
    padding: 16px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 15px;
    text-align: center;
  }
  .lobby-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 12px;
  }
  .player-card {
    background: rgba(0,0,0,0.3);
    padding: 10px;
    border-radius: 10px;
  }

  /* Mobile controls */
  #mobileControls{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    z-index:15;
    display:none;
    justify-content:space-between;
    align-items:flex-end;
    padding:12px 14px max(12px, env(safe-area-inset-bottom));
    gap:12px;
    pointer-events:none;
  }
  .joyPanel, .actionPanel{
    pointer-events:auto;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
  }
  .joyPad{
    width:132px;
    height:132px;
    border-radius:50%;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.12);
    box-shadow:0 12px 28px rgba(0,0,0,.32);
    backdrop-filter: blur(8px);
    position:relative;
    touch-action:none;
  }
  .joyKnob{
    position:absolute;
    left:50%;
    top:50%;
    width:58px;
    height:58px;
    margin-left:-29px;
    margin-top:-29px;
    border-radius:50%;
    background:rgba(255,255,255,.18);
    border:1px solid rgba(255,255,255,.18);
    box-shadow:0 8px 18px rgba(0,0,0,.28);
    transform:translate(0px, 0px);
  }
  .joyText{
    font-size:12px;
    opacity:.8;
    font-weight:800;
    letter-spacing:.2px;
  }
  .actionRow{
    display:flex;
    gap:10px;
  }
  .mobileBtn{
    width:86px;
    height:86px;
    border:none;
    border-radius:22px;
    color:#fff;
    font-size:16px;
    font-weight:900;
    box-shadow:0 12px 28px rgba(0,0,0,.32);
    backdrop-filter: blur(8px);
    touch-action:none;
    -webkit-tap-highlight-color: transparent;
  }
  .mobileBtn:active{ transform:scale(.97); filter:brightness(1.08); }
  .mobileBtn.fire{ background:linear-gradient(135deg, #8b5dff, #cf7eff); }
  .mobileBtn.dash{ background:linear-gradient(135deg, #1f90ff, #4adfff); }
  .mobileBtn.pause{ background:linear-gradient(135deg, #3b4255, #232937); }
  .mobileHint{
    display:none;
    position:fixed;
    left:50%;
    bottom:190px;
    transform:translateX(-50%);
    z-index:14;
    background:rgba(10,14,22,.72);
    border:1px solid rgba(255,255,255,.08);
    border-radius:999px;
    padding:8px 12px;
    font-size:12px;
    opacity:.88;
    pointer-events:none;
  }
  @media (pointer: coarse), (max-width: 900px){
    #tips{ display:none; }
    #mobileHint{ display:block; }
  }
</style>
</head>
<body>
<div id="hud">
  <div class="barWrap">
    <div class="barLabel"><span id="playerLabel">Player</span><span id="playerHpText">0 / 0</span></div>
    <div class="bar"><div id="playerHpBar" class="fill playerFill"></div></div>
  </div>
  <div class="barWrap">
    <div class="barLabel"><span id="enemyLabel">Enemy</span><span id="enemyHpText">0 / 0</span></div>
    <div class="bar"><div id="enemyHpBar" class="fill enemyFill"></div></div>
  </div>
</div>

<div id="tips">
  <div style="font-weight:900;margin-bottom:6px;">操作</div>
  <div>
    <span class="kbd">WASD</span> 移動<br>
    <span class="kbd">Space</span> 射擊<br>
    <span class="kbd">Shift</span> 衝刺<br>
    <span class="kbd">P</span> 暫停<br>
    滑鼠瞄準。子彈2秒後自動消失。彩虹球會持續 5 秒並每 2 秒攻擊一次。
  </div>
</div>

<button id="restartBtn">重新開始</button>

<div id="overlay"><div id="bigMsg">GAME OVER</div></div>

<div id="menu">
  <div class="card">
    <div class="title">Shorts Battle</div>
    <div class="sub">紅色子彈會變大且傷害 7，藍色速度更快，綠色是吸血彈，紫色魔法彈會蛇行，並有機率召喚彩虹球。</div>

    <div class="section">先選模式</div>
    <div class="grid">
      <button class="btn gray" data-mode="solo">單挑 1v1</button>
      <button class="btn gray" data-mode="team">隊友 2v2</button>
      <button class="btn purple" data-mode="pvp" style="grid-column: span 2;">真人 1v1 連線</button>
    </div>
    <div id="modeSummary" class="small">請先選擇一個模式。</div>

    <div id="pvpSection" style="display:none; margin-top: 14px;">
      <div class="section">房間操作</div>
      <div class="grid" id="roomBtnGroup">
        <button class="btn blue" id="createRoomBtn">建立房間</button>
        <button class="btn green" id="joinRoomBtn">加入房間</button>
      </div>
      <div id="roomArea" style="margin-top:14px; text-align:center; display:none;">
        <div id="roomCodeDisplay" style="font-size:20px; font-weight:bold; color:#4adfff; margin-bottom:10px;"></div>
        <div style="display:flex; gap:10px; justify-content:center;">
          <input type="text" id="roomCodeInput" class="room-input" placeholder="輸入4位代碼" maxlength="4" style="width:140px;">
          <button class="btn blue" id="confirmJoinBtn" style="min-height:auto; padding:0 20px;">進入</button>
        </div>
      </div>
    </div>

    <div id="lobbyStatus"></div>

    <div id="roleSection" style="display:none;">
      <div class="section">選擇你的角色</div>
      <div class="grid">
        <button class="btn blue" data-pick="blue">Blue Mage</button>
        <button class="btn red" data-pick="red">Red Knight</button>
        <button class="btn green" data-pick="green">Green Vampire</button>
        <button class="btn purple" data-pick="purple">Purple Mage</button>
      </div>

      <div id="allySection" style="display:none; margin-top: 14px;">
        <div class="section">選擇隊友的角色</div>
        <div class="grid">
          <button class="btn blue" data-ally-pick="blue">Blue Mage</button>
          <button class="btn red" data-ally-pick="red">Red Knight</button>
          <button class="btn green" data-ally-pick="green">Green Vampire</button>
          <button class="btn purple" data-ally-pick="purple">Purple Mage</button>
        </div>
      </div>

      <div class="grid" style="margin-top:14px;">
        <button class="btn gray" id="startBtn" disabled>開始遊戲</button>
        <button class="btn gray" id="clearBtn">重選模式</button>
      </div>
    </div>
  </div>
</div>


<div id="mobileHint">手機版：左邊移動，右邊射擊 / 衝刺 / 暫停</div>
<div id="mobileControls">
  <div class="joyPanel">
    <div id="joyPad" class="joyPad">
      <div id="joyKnob" class="joyKnob"></div>
    </div>
    <div class="joyText">移動</div>
  </div>
  <div class="actionPanel">
    <button id="mobileFire" class="mobileBtn fire">射擊</button>
    <div class="actionRow">
      <button id="mobileDash" class="mobileBtn dash">衝刺</button>
      <button id="mobilePause" class="mobileBtn pause">暫停</button>
    </div>
  </div>
</div>

<div id="stage"><canvas id="c" width="900" height="500"></canvas></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, update, onDisconnect, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD8l8YJMU1Pupj66qZG4LNMUC4sEEaDk-8",
    authDomain: "shogig-4229a.firebaseapp.com",
    projectId: "shogig-4229a",
    storageBucket: "shogig-4229a.firebasestorage.app",
    messagingSenderId: "943333196173",
    appId: "1:943333196173:web:a74d48b2205948f4273dc4",
    measurementId: "G-K2M15YM12Q",
    databaseURL: "https://shogig-4229a-default-rtdb.firebaseio.com"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const W = 900, H = 500;
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  const menu = document.getElementById('menu');
  const startBtn = document.getElementById('startBtn');
  const clearBtn = document.getElementById('clearBtn');
  const restartBtn = document.getElementById('restartBtn');
  const overlay = document.getElementById('overlay');
  const bigMsg = document.getElementById('bigMsg');
  const tips = document.getElementById('tips');
  const roleSection = document.getElementById('roleSection');
  const allySection = document.getElementById('allySection');
  const pvpSection = document.getElementById('pvpSection');
  const lobbyStatus = document.getElementById('lobbyStatus');
  const modeSummary = document.getElementById('modeSummary');

  const playerLabel = document.getElementById('playerLabel');
  const enemyLabel = document.getElementById('enemyLabel');
  const playerHpBar = document.getElementById('playerHpBar');
  const enemyHpBar = document.getElementById('enemyHpBar');
  const playerHpText = document.getElementById('playerHpText');
  const enemyHpText = document.getElementById('enemyHpText');

  const keys = new Set();
  let mouse = { x: W * 0.5, y: H * 0.5 };
  const isTouchDevice = window.matchMedia('(pointer: coarse)').matches || 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  const mobileControls = document.getElementById('mobileControls');
  const mobileHint = document.getElementById('mobileHint');
  const joyPad = document.getElementById('joyPad');
  const joyKnob = document.getElementById('joyKnob');
  const mobileFire = document.getElementById('mobileFire');
  const mobileDash = document.getElementById('mobileDash');
  const mobilePause = document.getElementById('mobilePause');
  const mobileInput = { moveX: 0, moveY: 0, fireHeld: false, dashTap: false, joyPointerId: null, joyMax: 42 };

  function clampJoy(v){ return Math.max(-1, Math.min(1, v)); }
  function setJoyVisual(dx, dy){ joyKnob.style.transform = `translate(${dx}px, ${dy}px)`; }
  function resetJoy(){ mobileInput.moveX = 0; mobileInput.moveY = 0; setJoyVisual(0, 0); }
  function showMobileControls(show){
    if(!mobileControls) return;
    mobileControls.style.display = (show && isTouchDevice) ? 'flex' : 'none';
    if(mobileHint) mobileHint.style.display = (show && isTouchDevice) ? 'block' : 'none';
  }
  function getMobileAimPoint(fighter){
    const enemies = alive(getEnemyListForOwner(fighter));
    if(!enemies.length){ return { x: fighter.x + (fighter.team === 'player' ? 1 : -1), y: fighter.y }; }
    let target = enemies[0];
    let best = Infinity;
    for(const e of enemies){
      const d = dist(fighter.x, fighter.y, e.x, e.y);
      if(d < best){ best = d; target = e; }
    }
    return { x: target.x, y: target.y };
  }

  const presets = {
    blue:   { name:'Blue Mage',     color:'#4adfff', hp:100, speed:3.15, shotCd:20, dashPower:9.4, role:'blue' },
    red:    { name:'Red Knight',    color:'#ff516f', hp:110, speed:2.8,  shotCd:24, dashPower:8.8, role:'red' },
    green:  { name:'Green Vampire', color:'#5cff8f', hp:105, speed:2.95, shotCd:22, dashPower:8.9, role:'green' },
    purple: { name:'Purple Mage',   color:'#b07cff', hp:95,  speed:3.0,  shotCd:21, dashPower:9.0, role:'purple' }
  };

  let selectedKey = null;
  let selectedAllyKey = null; 
  let selectedMode = null; 
  let running = false;
  let gameOver = false;
  let isPaused = false; 
  let shake = 0;

  let playerMain = null, enemyMain = null;
  let playerTeam = [], enemyTeam = [];
  let bullets = [], particles = [], trails = [], rainbowBalls = [];

  // PvP 變數
  let roomCode = '';
  let pvpRole = null; 
  let lastShotTime = 0;
  let isReady = false;

  function rand(min, max){ return Math.random() * (max - min) + min; }
  function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }
  function dist(x1, y1, x2, y2){ return Math.hypot(x1-x2, y1-y2); }
  function circleHit(a, b){ return dist(a.x, a.y, b.x, b.y) <= (a.r + b.r); }
  function alive(team){ return team.filter(f => f.hp > 0); }

  function makeFighter(preset, x, y, team, controlled=false, isLeader=false){
    return {
      x, y, vx:0, vy:0, r:18,
      hp:preset.hp, maxHp:preset.hp, color:preset.color, name:preset.name,
      speedBase:preset.speed, shotCdBase:preset.shotCd, dashPower:preset.dashPower, role:preset.role,
      cd:0, dashCd:0, dashTime:0, invuln:0, aiBurst:0,
      team, controlled, isLeader, mx: W/2, my: H/2 
    };
  }

  function getBulletSpeed(role){
    if(role === 'red') return 5.5; if(role === 'blue') return 7.4;
    if(role === 'green') return 6.1; return 5.8;
  }

  function teamStats(team){
    const members = team.filter(f => f.maxHp > 0);
    const current = members.reduce((s, f) => s + Math.max(0, f.hp), 0);
    const max = members.reduce((s, f) => s + f.maxHp, 0) || 1;
    return { current, max, alive: alive(team).length, total: team.length };
  }

  function updateHud(){
    if(selectedMode === 'team' && playerTeam.length && enemyTeam.length){
      const p = teamStats(playerTeam), e = teamStats(enemyTeam);
      playerLabel.textContent = `Player Team (${p.alive}/${p.total})`;
      enemyLabel.textContent = `Enemy Team (${e.alive}/${e.total})`;
      playerHpText.textContent = `${Math.max(0, Math.round(p.current))} / ${p.max}`;
      enemyHpText.textContent = `${Math.max(0, Math.round(e.current))} / ${e.max}`;
      playerHpBar.style.width = (clamp(p.current / p.max, 0, 1) * 100).toFixed(1) + '%';
      enemyHpBar.style.width = (clamp(e.current / e.max, 0, 1) * 100).toFixed(1) + '%';
    } else if(playerMain && enemyMain && (selectedMode === 'solo' || selectedMode === 'pvp')){
      playerLabel.textContent = playerMain.name; enemyLabel.textContent = enemyMain.name;
      playerHpText.textContent = `${Math.max(0, Math.round(playerMain.hp))} / ${playerMain.maxHp}`;
      enemyHpText.textContent = `${Math.max(0, Math.round(enemyMain.hp))} / ${enemyMain.maxHp}`;
      playerHpBar.style.width = (clamp(playerMain.hp / playerMain.maxHp, 0, 1) * 100).toFixed(1) + '%';
      enemyHpBar.style.width = (clamp(enemyMain.hp / enemyMain.maxHp, 0, 1) * 100).toFixed(1) + '%';
    } else {
      playerLabel.textContent = 'Player'; enemyLabel.textContent = 'Enemy';
      playerHpText.textContent = '0 / 0'; enemyHpText.textContent = '0 / 0';
      playerHpBar.style.width = '0%'; enemyHpBar.style.width = '0%';
    }
  }

  function resetGame(){
    bullets = []; particles = []; trails = []; rainbowBalls = [];
    shake = 0; gameOver = false; isPaused = false;

    if(selectedMode === 'team'){
      const unusedKeys = Object.keys(presets).filter(k => k !== selectedKey && k !== selectedAllyKey);
      for (let i = unusedKeys.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [unusedKeys[i], unusedKeys[j]] = [unusedKeys[j], unusedKeys[i]];
      }
      playerMain = makeFighter(presets[selectedKey], 170, H/2, 'player', true, true);
      const playerAlly = makeFighter(presets[selectedAllyKey], 112, H/2 + 92, 'player', false, false); playerAlly.name = 'AI 隊友'; 
      enemyMain = makeFighter(presets[unusedKeys[0]]||presets['red'], W - 170, H/2, 'enemy', false, true);
      const enemyAlly = makeFighter(presets[unusedKeys[1]]||presets['green'], W - 112, H/2 - 92, 'enemy', false, false);
      playerTeam = [playerMain, playerAlly]; enemyTeam = [enemyMain, enemyAlly];
    } else if (selectedMode === 'pvp') {
      playerMain = makeFighter(presets[selectedKey], 180, H/2, 'player', pvpRole==='host', true);
      enemyMain = makeFighter(presets[selectedAllyKey], W - 180, H/2, 'enemy', pvpRole==='guest', true);
      playerTeam = [playerMain]; enemyTeam = [enemyMain];
    } else {
      const avail = Object.keys(presets).filter(k => k !== selectedKey);
      playerMain = makeFighter(presets[selectedKey], 180, H/2, 'player', true, true);
      enemyMain = makeFighter(presets[avail[Math.floor(Math.random() * avail.length)]], W - 180, H/2, 'enemy', false, true);
      playerTeam = [playerMain]; enemyTeam = [enemyMain];
    }

    overlay.style.display = 'none'; restartBtn.style.display = 'none'; showMobileControls(false); updateHud();
  }

  function showMenuForModeSelection(){
    menu.style.display = 'grid'; tips.style.display = 'block';
    roleSection.style.display = 'none'; allySection.style.display = 'none';
    pvpSection.style.display = 'none'; lobbyStatus.style.display = 'none';
    document.getElementById('roomBtnGroup').style.display = 'grid';
    document.getElementById('roomArea').style.display = 'none';
    startBtn.disabled = true;
    selectedMode = null; selectedKey = null; selectedAllyKey = null; pvpRole = null; roomCode = '';
    isReady = false; isPaused = false; showMobileControls(false); resetJoy(); mobileInput.fireHeld = false; mobileInput.dashTap = false;
    document.querySelectorAll('[data-mode]').forEach(btn => btn.classList.remove('modePicked'));
    document.querySelectorAll('[data-pick]').forEach(btn => btn.style.outline = 'none');
    document.querySelectorAll('[data-ally-pick]').forEach(btn => btn.style.outline = 'none');
    startBtn.textContent = '開始遊戲';
    updateHud();
  }

  function updateStartButton(){
    if (selectedMode === 'pvp') {
      startBtn.disabled = !selectedKey;
      startBtn.textContent = isReady ? '已準備，等待對方...' : '準備就緒';
      return;
    }
    const isAllySelected = (selectedMode === 'team') ? !!selectedAllyKey : true;
    startBtn.disabled = !(selectedMode && selectedKey && isAllySelected);
    startBtn.textContent = (selectedMode === 'team') ? '開始隊友模式' : '開始單挑模式';
  }

  function startGame(){
    if(!selectedMode || !selectedKey) return;
    if(selectedMode === 'team' && !selectedAllyKey) return;
    menu.style.display = 'none'; tips.style.display = 'none';
    resetGame(); running = true; showMobileControls(true);

    if (selectedMode === 'pvp') {
      const oppPath = (pvpRole === 'guest') ? 'host' : 'guest';
      const oppFighter = (pvpRole === 'guest') ? playerMain : enemyMain;
      const myPath = pvpRole;
      const myFighter = (pvpRole === 'guest') ? enemyMain : playerMain;
      
      onValue(ref(db, `rooms/${roomCode}/${oppPath}`), (snapshot) => {
        const data = snapshot.val();
        if (data && running) {
          oppFighter.x = data.x; oppFighter.y = data.y;
          oppFighter.dashTime = data.dashTime;
          oppFighter.mx = data.mx; oppFighter.my = data.my;
        }
      });

      onValue(ref(db, `rooms/${roomCode}/shots/${oppPath}`), (snapshot) => {
        const data = snapshot.val();
        if (data && data.ts > lastShotTime && running) {
          lastShotTime = data.ts;
          if (!document.hidden) {
            shoot(oppFighter, { x: data.mx, y: data.my }, true);
          }
        }
      });

      const eventsRef = ref(db, `rooms/${roomCode}/events`);
      onChildAdded(eventsRef, (snapshot) => {
        const ev = snapshot.val();
        if(!ev) return;

        if (ev.type === 'hit' && ev.target === myPath) {
          myFighter.hp -= ev.damage;
          myFighter.invuln = 5;
          
          if (!document.hidden) {
            applyExplosion(myFighter.x, myFighter.y, '#ff516f');
          }
          
          if (myFighter.hp <= 0 && !gameOver) {
            updateBullets();
            endGame('ENEMY WIN');
          }
        } else if (ev.type === 'heal' && ev.target === oppPath) {
          oppFighter.hp = Math.min(oppFighter.maxHp, oppFighter.hp + ev.amount);
          
          if (!document.hidden) {
            addParticles(oppFighter.x, oppFighter.y, '#5cff8f', 14, 3.2, 18);
          }
        }
      });
    }
  }

  function endGame(text){
    gameOver = true; isPaused = false; bigMsg.textContent = text; overlay.style.display = 'grid';
    if(selectedMode !== 'pvp') { restartBtn.style.display = 'inline-block'; } 
    else { setTimeout(showMenuForModeSelection, 3000); }
  }

  function addParticles(x, y, color, count=12, power=3, life=22){
    for(let i=0;i<count;i++){
      const a = rand(0, Math.PI*2), s = rand(power*0.25, power);
      particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: life + rand(-5, 5), maxLife: life + rand(-5, 5), size: rand(1.4, 3.5), color });
    }
  }

  function createRainbowBall(owner, x, y){
    const ball = {
      x, y, vx: rand(-0.3, 0.3), vy: rand(-0.3, 0.3), r: 11,
      owner, role: 'rainbow', damage: 2, colorIndex: rand(0, Math.PI * 2),
      life: 300, maxLife: 300, attackCd: 0, homeTimer: 0
    };
    rainbowBalls.push(ball);
    addParticles(x, y, '#ffffff', 8, 2.2, 16);
    return ball;
  }

  function getEnemyListForOwner(owner){
    return owner.team === 'player' ? enemyTeam : playerTeam;
  }

  function updateRainbowBalls(){
    for(let i = rainbowBalls.length - 1; i >= 0; i--){
      const rb = rainbowBalls[i];
      rb.life--;
      rb.attackCd--;
      rb.colorIndex += 0.14;

      const enemies = alive(getEnemyListForOwner(rb.owner));
      if(!enemies.length || rb.life <= 0){
        rainbowBalls.splice(i, 1);
        continue;
      }

      let target = enemies[0];
      let best = Infinity;
      for(const e of enemies){
        const d = dist(rb.x, rb.y, e.x, e.y);
        if(d < best){ best = d; target = e; }
      }

      const dx = target.x - rb.x, dy = target.y - rb.y, d = Math.max(0.001, Math.hypot(dx, dy));
      const follow = 0.18;
      rb.vx += (dx / d) * follow;
      rb.vy += (dy / d) * follow;

      const maxSpd = 2.6;
      const sp = Math.hypot(rb.vx, rb.vy);
      if(sp > maxSpd){ rb.vx = (rb.vx / sp) * maxSpd; rb.vy = (rb.vy / sp) * maxSpd; }

      rb.x += rb.vx;
      rb.y += rb.vy;
      rb.vx *= 0.98;
      rb.vy *= 0.98;

      const pad = rb.r + 6;
      if(rb.x < pad){ rb.x = pad; rb.vx *= -0.7; }
      if(rb.x > W - pad){ rb.x = W - pad; rb.vx *= -0.7; }
      if(rb.y < pad){ rb.y = pad; rb.vy *= -0.7; }
      if(rb.y > H - pad){ rb.y = H - pad; rb.vy *= -0.7; }

      trails.push({ x: rb.x, y: rb.y, color: `hsl(${(rb.colorIndex * 180 / Math.PI) % 360}, 100%, 70%)`, life: 12, vx: rand(-0.12,0.12), vy: rand(-0.12,0.12) });

      if(rb.attackCd <= 0 && d < 135){
        target.hp -= rb.damage;
        target.invuln = 8;
        rb.attackCd = 120; // 2秒
        addParticles(target.x, target.y, '#ffffff', 12, 2.8, 18);
        applyExplosion(target.x, target.y, `hsl(${(rb.colorIndex * 180 / Math.PI) % 360}, 100%, 70%)`);
        screenShake(3);

        const playerDead = alive(playerTeam).length === 0;
        const enemyDead = alive(enemyTeam).length === 0;
        if(playerDead || enemyDead) {
          endGame(enemyDead ? 'PLAYER WIN' : 'ENEMY WIN');
        }
      }

      if(rb.life <= 0){
        addParticles(rb.x, rb.y, '#ffffff', 10, 2.0, 16);
        rainbowBalls.splice(i, 1);
      }
    }
  }

  function screenShake(amount){ shake = Math.max(shake, amount); }
  function applyExplosion(x, y, color){ screenShake(8); addParticles(x, y, color, 20, 4.8, 26); }

  function shoot(shooter, aimPoint, ignoreCd = false){
    if((!ignoreCd && shooter.cd > 0) || gameOver || isPaused || shooter.hp <= 0) return;
    const dx = aimPoint.x - shooter.x, dy = aimPoint.y - shooter.y, d = Math.max(0.001, Math.hypot(dx, dy));

    const bullet = {
      x: shooter.x + (dx/d) * (shooter.r + 8), y: shooter.y + (dy/d) * (shooter.r + 8),
      vx: (dx/d) * getBulletSpeed(shooter.role), vy: (dy/d) * getBulletSpeed(shooter.role),
      r: 5, color: shooter.color, owner: shooter, life: 60, bounce: 2, damage: 4, role: shooter.role
    };

    if(shooter.role === 'red'){ bullet.r = 9; bullet.damage = 7; } 
    else if(shooter.role === 'green'){ bullet.r = 6; bullet.damage = 3; bullet.healAmount = 3; } 
    else if(shooter.role === 'purple'){ bullet.r = 6; bullet.damage = 5; bullet.phase = rand(0, Math.PI*2);
      if(Math.random() < 0.05){ createRainbowBall(shooter, shooter.x, shooter.y); }
    }

    bullets.push(bullet); shooter.cd = shooter.shotCdBase;
    addParticles(bullet.x, bullet.y, shooter.color, 6, 2.0, 14);

    const myFighter = (pvpRole === 'guest') ? enemyMain : playerMain;
    if (selectedMode === 'pvp' && shooter === myFighter && !ignoreCd) {
      set(ref(db, `rooms/${roomCode}/shots/${pvpRole}`), { ts: Date.now(), mx: aimPoint.x, my: aimPoint.y });
    }
  }

  function predictLead(s, t, spd, bias = 1){
    const d = Math.hypot(t.x - s.x, t.y - s.y);
    const time = clamp(d / Math.max(0.001, spd), 0, 28) * bias;
    return { x: t.x + (t.vx || 0) * time, y: t.y + (t.vy || 0) * time };
  }

  function bulletThreatScore(b, t){
    const rx = t.x - b.x, ry = t.y - b.y, d = Math.hypot(rx, ry), s = Math.hypot(b.vx, b.vy) || 0.001;
    return { distNow: d, dir: (rx * b.vx + ry * b.vy) / (d * s) };
  }

  function chooseTarget(attacker, enemies){
    const list = alive(enemies); if(!list.length) return null;
    let best = list[0], bestScore = Infinity;
    for(const e of list){
      const score = Math.max(0, e.hp) * 7.5 + dist(attacker.x, attacker.y, e.x, e.y) * 0.9;
      if(score < bestScore){ bestScore = score; best = e; }
    }
    return best;
  }

  function chooseAnchor(fighter, friends){
    const list = alive(friends).filter(f => f !== fighter); if(!list.length) return null;
    let best = list[0], bestDist = Infinity;
    for(const f of list){
      const d = dist(fighter.x, fighter.y, f.x, f.y);
      if(d < bestDist){ bestDist = d; best = f; }
    }
    return best;
  }

  function updatePlayerControlled(){
    const p = (selectedMode === 'pvp' && pvpRole === 'guest') ? enemyMain : playerMain;
    if(!p || p.hp <= 0) return;

    const useMobile = isTouchDevice;
    const spd = p.dashTime > 0 ? 5.8 : p.speedBase;
    let ax = 0, ay = 0;

    if(useMobile){
      ax = mobileInput.moveX;
      ay = mobileInput.moveY;
    } else {
      if(keys.has('KeyW')) ay -= 1; if(keys.has('KeyS')) ay += 1;
      if(keys.has('KeyA')) ax -= 1; if(keys.has('KeyD')) ax += 1;
    }

    const len = Math.max(0.001, Math.hypot(ax, ay));
    if(ax || ay){ p.vx += (ax/len) * spd * 0.34; p.vy += (ay/len) * spd * 0.34; }

    if(useMobile){
      const aimPoint = getMobileAimPoint(p);
      mouse.x = aimPoint.x;
      mouse.y = aimPoint.y;

      if(mobileInput.fireHeld && p.cd <= 0){
        shoot(p, aimPoint);
      }

      if(mobileInput.dashTap && p.dashCd <= 0 && p.dashTime <= 0){
        const dx = aimPoint.x - p.x, dy = aimPoint.y - p.y, d = Math.max(0.001, Math.hypot(dx, dy));
        p.vx += (dx/d) * p.dashPower; p.vy += (dy/d) * p.dashPower;
        p.dashTime = 10; p.dashCd = 58; p.invuln = 10;
        addParticles(p.x, p.y, '#ffffff', 12, 2.8, 16); screenShake(4);
      }
      mobileInput.dashTap = false;
    } else {
      if(keys.has('ShiftLeft') && p.dashCd <= 0 && p.dashTime <= 0){
        const dx = mouse.x - p.x, dy = mouse.y - p.y, d = Math.max(0.001, Math.hypot(dx, dy));
        p.vx += (dx/d) * p.dashPower; p.vy += (dy/d) * p.dashPower;
        p.dashTime = 10; p.dashCd = 58; p.invuln = 10;
        addParticles(p.x, p.y, '#ffffff', 12, 2.8, 16); screenShake(4);
      }

      if(keys.has('Space') && p.cd <= 0) shoot(p, { x: mouse.x, y: mouse.y });
    }

    if(p.cd > 0) p.cd--; if(p.dashCd > 0) p.dashCd--;
    if(p.dashTime > 0) p.dashTime--; 
    p.vx *= 0.93; p.vy *= 0.93;
  }

  function updateAI(f, enemySide, friendSide){
    if(f.hp <= 0) return;
    const target = chooseTarget(f, enemySide); if(!target) return;

    const spd = getBulletSpeed(f.role), low = f.hp < f.maxHp * 0.38;
    const aim = predictLead(f, target, spd, low ? 1.18 : 1.02);

    let mx = 0, my = 0;
    const dx = target.x - f.x, dy = target.y - f.y, d = Math.max(0.001, Math.hypot(dx, dy));
    const tx = dx/d, ty = dy/d, ax = -tx, ay = -ty, sx = -ty, sy = tx;

    const t = performance.now() * 0.001;
    const orbit = Math.sin(t * 4.3 + f.x * 0.01) * 0.95, jitter = Math.sin(t * 9.2 + f.y * 0.017) * 0.08;
    const ideal = f.role === 'blue' ? 205 : (f.role === 'red' ? 165 : (f.role === 'purple' ? 190 : 180));
    const err = d - (low ? 265 : ideal);

    if(d > (low ? 300 : ideal + 35)){ mx += tx * clamp(err / 110, 0, 1) * 1.25; my += ty * clamp(err / 110, 0, 1) * 1.25; } 
    else if(d < (low ? 235 : ideal - 30)){ mx += ax * clamp((-err) / 110, 0, 1) * 1.15; my += ay * clamp((-err) / 110, 0, 1) * 1.15; }

    mx += sx * orbit; my += sy * orbit;
    if(d < 115){ mx += ax * (low ? 1.9 : 1.45); my += ay * (low ? 1.9 : 1.45); }

    const anchor = chooseAnchor(f, friendSide);
    if(anchor){
      const ancx = anchor.x - f.x, ancy = anchor.y - f.y, ancd = Math.max(0.001, Math.hypot(ancx, ancy));
      const sIdeal = low ? 200 : 145;
      if(ancd > sIdeal + 30){ mx += (ancx / ancd) * 0.65; my += (ancy / ancd) * 0.65; } 
      else if(ancd < 85){ mx -= (ancx / ancd) * 0.5; my -= (ancy / ancd) * 0.5; }
    }

    let nThreat = null, nDist = 9999;
    for(const b of bullets){
      if(b.owner.team === f.team) continue;
      const s = bulletThreatScore(b, f);
      if(s.distNow < nDist){ nDist = s.distNow; nThreat = b; }
    }

    if(nThreat && nDist < (low ? 240 : 190)){
      const bv = Math.hypot(nThreat.vx, nThreat.vy) || 1, bx = nThreat.vx / bv, by = nThreat.vy / bv;
      const rx = f.x - nThreat.x, ry = f.y - nThreat.y, rxn = Math.hypot(rx, ry) || 1;
      const abx = rx / rxn, aby = ry / rxn, px = -by, py = bx;
      const weight = clamp((220 - nDist) / 220, 0.15, 1);
      mx += (abx * 1.6 + px * 1.2) * weight; my += (aby * 1.6 + py * 1.2) * weight;

      if(f.dashCd <= 0 && f.dashTime <= 0 && nDist < (low ? 220 : 170)){
        let dashX = abx * 0.8 + px * 0.9, dashY = aby * 0.8 + py * 0.9;
        const dl = Math.hypot(dashX, dashY) || 1; dashX /= dl; dashY /= dl;
        f.vx += dashX * f.dashPower * (low ? 1.05 : 0.88); f.vy += dashY * f.dashPower * (low ? 1.05 : 0.88);
        f.dashTime = low ? 10 : 8; f.dashCd = low ? 48 : 62; f.invuln = low ? 10 : 8;
        addParticles(f.x, f.y, f.color, 10, 2.4, 16); screenShake(2);
      }
    }

    mx += Math.cos(t * 3.2 + f.y * 0.02) * 0.14; my += Math.sin(t * 3.8 + f.x * 0.02) * 0.14;
    f.vx += (mx + jitter) * (low ? 0.44 : 0.36); f.vy += (my - jitter) * (low ? 0.44 : 0.36);
    f.aiBurst++;

    if(f.cd <= 0 && d < (low ? 650 : 560) && (d < (low ? 370 : 300) || f.aiBurst > (low ? 14 : 24) || Math.random() < 0.03)){
      shoot(f, aim); f.aiBurst = 0;
    }

    if(f.cd > 0) f.cd--; if(f.dashCd > 0) f.dashCd--;
    if(f.dashTime > 0) f.dashTime--; 
    f.vx *= low ? 0.948 : 0.935; f.vy *= low ? 0.948 : 0.935;
  }

  function updateFighterPhysics(f){
    if(f.hp <= 0) return;
    const m = f.dashTime > 0 ? 9.4 : 4.2, s = Math.hypot(f.vx, f.vy);
    if(s > m){ f.vx = (f.vx / s) * m; f.vy = (f.vy / s) * m; }
    f.x += f.vx; f.y += f.vy;
    const pad = f.r + 6;
    if(f.x < pad){ f.x = pad; f.vx *= -0.6; } if(f.x > W - pad){ f.x = W - pad; f.vx *= -0.6; }
    if(f.y < pad){ f.y = pad; f.vy *= -0.6; } if(f.y > H - pad){ f.y = H - pad; f.vy *= -0.6; }
    f.vx *= 0.985; f.vy *= 0.985;
    
    if (f.invuln > 0) f.invuln--;
  }

  function updateBullets(){
    for(let i = bullets.length - 1; i >= 0; i--){
      const b = bullets[i]; b.life--;

      if(b.role === 'purple'){
        b.phase += 0.18; const px = -b.vy, py = b.vx;
        b.x += b.vx + px * Math.sin(b.phase) * 0.22; b.y += b.vy + py * Math.sin(b.phase) * 0.22;
      } else { b.x += b.vx; b.y += b.vy; }

      trails.push({ x:b.x, y:b.y, color:b.color, life:10, vx:rand(-0.18,0.18), vy:rand(-0.18,0.18) });

      let bounced = false;
      if(b.x <= b.r || b.x >= W - b.r){ b.vx *= -1; b.bounce--; bounced = true; }
      if(b.y <= b.r || b.y >= H - b.r){ b.vy *= -1; b.bounce--; bounced = true; }
      if(bounced) addParticles(b.x, b.y, b.color, 7, 2.0, 16);

      const targets = b.owner.team === 'player' ? enemyTeam : playerTeam;
      const hitTarget = alive(targets).find(t => circleHit(b, t));

      if(hitTarget && hitTarget.invuln <= 0){
        let shouldDamage = true;
        
        if (selectedMode === 'pvp') {
          const myFighter = (pvpRole === 'guest') ? enemyMain : playerMain;
          if (b.owner === myFighter) {
            shouldDamage = true;
            hitTarget.hp -= b.damage;
            hitTarget.invuln = 5;
            
            const oppPath = (pvpRole === 'guest') ? 'host' : 'guest';
            push(ref(db, `rooms/${roomCode}/events`), { type: 'hit', target: oppPath, damage: b.damage, ts: Date.now() });
          } else {
            shouldDamage = false; 
          }
        } else {
          hitTarget.hp -= b.damage;
          hitTarget.invuln = 5;
        }

        if (shouldDamage) {
          if (b.role === 'green') {
            const healAmt = b.healAmount || b.damage;
            b.owner.hp = Math.min(b.owner.maxHp, b.owner.hp + healAmt);
            addParticles(b.owner.x, b.owner.y, '#5cff8f', 14, 3.2, 18);
            if (selectedMode === 'pvp') {
              push(ref(db, `rooms/${roomCode}/events`), { type: 'heal', target: pvpRole, amount: healAmt, ts: Date.now() });
            }
          }
        }

        applyExplosion(b.x, b.y, b.color);
        bullets.splice(i, 1);

        const playerDead = alive(playerTeam).length === 0;
        const enemyDead = alive(enemyTeam).length === 0;
        if(playerDead || enemyDead) {
          endGame(enemyDead ? 'PLAYER WIN' : 'ENEMY WIN');
        }
        continue;
      }

      if(b.life <= 0 || b.bounce < -1) bullets.splice(i, 1);
    }
  }

  function updateParticles(){
    for(let i = particles.length - 1; i >= 0; i--){
      const p = particles[i]; p.life--; p.x += p.vx; p.y += p.vy; p.vx *= 0.97; p.vy *= 0.97;
      if(p.life <= 0) particles.splice(i, 1);
    }
    for(let i = trails.length - 1; i >= 0; i--){
      const t = trails[i]; t.life--; t.x += t.vx; t.y += t.vy;
      if(t.life <= 0) trails.splice(i, 1);
    }
  }

  function drawBackground(){
    ctx.save(); ctx.fillStyle = '#090d14'; ctx.fillRect(0,0,W,H);
    ctx.globalAlpha = 0.07; ctx.strokeStyle = '#cfe0ff';
    for(let x = 0; x <= W; x += 60){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for(let y = 0; y <= H; y += 60){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
    ctx.globalAlpha = 1;
    const gx = W/2 + Math.sin(performance.now()*0.001)*10, gy = H/2 + Math.cos(performance.now()*0.0012)*8;
    const g = ctx.createRadialGradient(gx, gy, 18, gx, gy, 280);
    g.addColorStop(0, 'rgba(80,220,255,.06)'); g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H); ctx.restore();
  }

  function drawFighter(f){
    if(!f || f.hp <= 0) return;
    ctx.save(); ctx.shadowColor = f.color; ctx.shadowBlur = 22; ctx.fillStyle = f.invuln > 0 ? '#ffffff' : f.color;
    ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2); ctx.fill();

    ctx.shadowBlur = 0; ctx.fillStyle = 'rgba(255,255,255,.9)'; ctx.beginPath();
    const eyeOffsetX = (selectedMode === 'pvp' && pvpRole === 'guest' && !f.controlled) ? -5 : (f.controlled ? 5 : -5);
    ctx.arc(f.x + eyeOffsetX, f.y - 4, 2.7, 0, Math.PI * 2); ctx.fill();

    if(f.dashTime > 0){
      ctx.strokeStyle = 'rgba(255,255,255,.45)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(f.x, f.y, f.r + 6, 0, Math.PI*2); ctx.stroke();
    }
    ctx.fillStyle = 'rgba(255,255,255,.85)'; ctx.font = '12px system-ui, sans-serif'; ctx.textAlign = 'center'; 
    ctx.fillText(f.controlled ? 'YOU' : f.name, f.x, f.y - 26); ctx.restore();
  }

  function drawBullets(){
    for(const b of bullets){
      ctx.save(); ctx.shadowColor = b.color; ctx.shadowBlur = b.role === 'purple' ? 20 : 16;
      ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill(); ctx.restore();
    }
  }

  function drawRainbowBalls(){
    for(const rb of rainbowBalls){
      const hue = ((rb.colorIndex * 180 / Math.PI) % 360);
      const grad = ctx.createRadialGradient(rb.x - 3, rb.y - 3, 2, rb.x, rb.y, rb.r + 6);
      grad.addColorStop(0, `hsla(${hue}, 100%, 92%, 1)`);
      grad.addColorStop(0.45, `hsla(${(hue + 50) % 360}, 100%, 70%, 1)`);
      grad.addColorStop(1, `hsla(${(hue + 120) % 360}, 100%, 58%, 1)`);
      ctx.save();
      ctx.shadowColor = `hsla(${hue}, 100%, 70%, 0.9)`;
      ctx.shadowBlur = 20;
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(rb.x, rb.y, rb.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawParticles(){
    for(const t of trails){
      const a = Math.max(0, t.life / 10); ctx.save(); ctx.globalAlpha = a * 0.55; ctx.fillStyle = t.color;
      ctx.beginPath(); ctx.arc(t.x, t.y, 2.1, 0, Math.PI*2); ctx.fill(); ctx.restore();
    }
    for(const p of particles){
      const a = Math.max(0, p.life / p.maxLife); ctx.save(); ctx.globalAlpha = a; ctx.shadowColor = p.color; ctx.shadowBlur = 10;
      ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); ctx.restore();
    }
  }

  function drawUI(){
    updateHud();
    ctx.save(); ctx.fillStyle = 'rgba(255,255,255,.72)'; ctx.font = '14px system-ui, sans-serif'; ctx.textAlign = 'center';
    if(isTouchDevice){
      ctx.fillText('手機：左移動 / 右射擊與衝刺', W/2, H - 14);
    } else {
      ctx.fillText('Move: WASD   Shoot: Space / Click   Dash: Shift   Pause: P', W/2, H - 14);
    }
    ctx.restore();
  }

  function drawPauseScreen(){
    ctx.save(); ctx.fillStyle = 'rgba(0, 0, 0, 0.65)'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 50px system-ui, sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('PAUSED', W/2, H/2 - 20); ctx.font = '20px system-ui, sans-serif'; ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
    ctx.fillText('按 P 鍵繼續遊戲', W/2, H/2 + 25); ctx.fillText('按 Q 鍵退出至主選單', W/2, H/2 + 60); ctx.restore();
  }

  function render(){
    drawBackground(); drawParticles(); drawBullets(); drawRainbowBalls();
    drawFighter(playerMain); if(selectedMode === 'team' && playerTeam[1]) drawFighter(playerTeam[1]);
    drawFighter(enemyMain); if(selectedMode === 'team' && enemyTeam[1]) drawFighter(enemyTeam[1]);
    drawUI(); if(isPaused) drawPauseScreen();
  }

  function applyShake(){
    if(shake > 0.15){ ctx.setTransform(1,0,0,1, rand(-shake, shake), rand(-shake, shake)); shake *= 0.88; }
    else{ ctx.setTransform(1,0,0,1,0,0); shake = 0; }
  }

  function gameLoop(){
    if(running){
      if(!gameOver && !isPaused){
        updatePlayerControlled();
        
        if (selectedMode === 'pvp') {
          const myFighter = (pvpRole === 'guest') ? enemyMain : playerMain;
          const myPath = (pvpRole === 'guest') ? 'guest' : 'host';
          update(ref(db, `rooms/${roomCode}/${myPath}`), {
            x: myFighter.x, y: myFighter.y, mx: mouse.x, my: mouse.y, dashTime: myFighter.dashTime
          });
        } else {
          for(const f of playerTeam){ if(f !== playerMain) updateAI(f, enemyTeam, playerTeam); }
          for(const f of enemyTeam){ updateAI(f, playerTeam, enemyTeam); }
        }

        for(const f of playerTeam) updateFighterPhysics(f);
        for(const f of enemyTeam) updateFighterPhysics(f);

        updateBullets(); updateRainbowBalls(); updateParticles();
      } else if (gameOver) {
        updateBullets(); updateRainbowBalls(); updateParticles();
      }
    }
    render(); applyShake(); requestAnimationFrame(gameLoop);
  }

  document.querySelectorAll('[data-mode]').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedMode = btn.dataset.mode;
      document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('modePicked'));
      btn.classList.add('modePicked');
      
      if (selectedMode === 'pvp') {
        pvpSection.style.display = 'block'; roleSection.style.display = 'none'; allySection.style.display = 'none';
        lobbyStatus.style.display = 'none'; document.getElementById('roomBtnGroup').style.display = 'grid';
        modeSummary.textContent = '真人 1v1 連線：建立房間，或輸入代碼加入好友的房間。';
      } else {
        pvpSection.style.display = 'none'; roleSection.style.display = 'block'; document.getElementById('roomArea').style.display = 'none';
        lobbyStatus.style.display = 'none';
        if (selectedMode === 'team') {
          allySection.style.display = 'block'; modeSummary.textContent = '你會是 2v2 隊友模式：你和 AI 隊友一起打，敵方也會有 AI 隊友。';
        } else {
          allySection.style.display = 'none'; selectedAllyKey = null; 
          document.querySelectorAll('[data-ally-pick]').forEach(b => b.style.outline = 'none');
          modeSummary.textContent = '你會是單挑模式：你對上一個 AI 敵人。';
        }
      }
      updateStartButton();
    });
  });

  function listenToLobby() {
    onValue(ref(db, `rooms/${roomCode}`), (snapshot) => {
      const data = snapshot.val();
      if (!data) return;

      if (data.status === 'lobby') {
        lobbyStatus.style.display = 'block';
        const hostRole = data.host?.role ? presets[data.host.role].name : '選擇中...';
        const guestRole = data.guest?.role ? presets[data.guest.role].name : '等待加入...';
        const hostRdy = data.host?.ready ? '<span style="color:#5cff8f;font-weight:bold;">已準備 ✔</span>' : '<span style="color:#ff516f">準備中...</span>';
        const guestRdy = data.guest?.ready ? '<span style="color:#5cff8f;font-weight:bold;">已準備 ✔</span>' : '<span style="color:#ff516f">準備中...</span>';

        lobbyStatus.innerHTML = `
          <div style="font-size:20px; font-weight:bold; color:#4adfff;">大廳代碼: ${roomCode}</div>
          <div class="lobby-grid">
            <div class="player-card">
              <div style="color:#aaa; font-size:12px;">房主 (Host)</div>
              <div style="font-weight:bold; font-size:16px; margin:6px 0;">${hostRole}</div>
              ${hostRdy}
            </div>
            <div class="player-card">
              <div style="color:#aaa; font-size:12px;">對手 (Guest)</div>
              <div style="font-weight:bold; font-size:16px; margin:6px 0;">${guestRole}</div>
              ${guestRdy}
            </div>
          </div>
        `;

        if (data.host?.ready && data.guest?.ready && pvpRole === 'host') {
           update(ref(db, `rooms/${roomCode}`), { status: 'playing' });
        }
      } else if (data.status === 'playing' && !running) {
        selectedKey = data.host.role;
        selectedAllyKey = data.guest.role;
        startGame();
      }
    });
  }

  document.getElementById('createRoomBtn').addEventListener('click', () => {
    pvpRole = 'host'; roomCode = Math.floor(1000 + Math.random() * 9000).toString();
    document.getElementById('roomBtnGroup').style.display = 'none';
    roleSection.style.display = 'block';
    
    set(ref(db, `rooms/${roomCode}`), { status: 'lobby', host: { ready: false } });
    onDisconnect(ref(db, `rooms/${roomCode}`)).remove();
    listenToLobby();
  });

  document.getElementById('joinRoomBtn').addEventListener('click', () => {
    pvpRole = 'guest'; document.getElementById('roomArea').style.display = 'block';
  });

  document.getElementById('confirmJoinBtn').addEventListener('click', () => {
    const inputCode = document.getElementById('roomCodeInput').value.trim();
    if (!inputCode) return alert('請輸入代碼！');
    onValue(ref(db, `rooms/${inputCode}`), (snapshot) => {
      const data = snapshot.val();
      if (data && data.status === 'lobby') {
        roomCode = inputCode; document.getElementById('roomBtnGroup').style.display = 'none';
        document.getElementById('roomArea').style.display = 'none';
        roleSection.style.display = 'block';
        update(ref(db, `rooms/${roomCode}/guest`), { ready: false });
        listenToLobby();
      } else { alert('找不到該房間！'); }
    }, { onlyOnce: true });
  });

  document.querySelectorAll('[data-pick]').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedKey = btn.dataset.pick;
      document.querySelectorAll('[data-pick]').forEach(b => b.style.outline = 'none');
      btn.style.outline = '2px solid rgba(255,255,255,.45)';
      
      if (selectedMode === 'pvp' && roomCode) {
        isReady = false; 
        update(ref(db, `rooms/${roomCode}/${pvpRole}`), { role: selectedKey, ready: false });
      }
      updateStartButton();
    });
  });

  document.querySelectorAll('[data-ally-pick]').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedAllyKey = btn.dataset.allyPick;
      document.querySelectorAll('[data-ally-pick]').forEach(b => b.style.outline = 'none');
      btn.style.outline = '2px solid rgba(255,255,255,.45)'; updateStartButton();
    });
  });

  startBtn.addEventListener('click', () => {
    if (selectedMode === 'pvp') {
      isReady = true;
      update(ref(db, `rooms/${roomCode}/${pvpRole}`), { ready: true });
      updateStartButton();
    } else {
      startGame();
    }
  });

  clearBtn.addEventListener('click', showMenuForModeSelection);
  restartBtn.addEventListener('click', () => {
    if(!selectedMode || !selectedKey){ showMenuForModeSelection(); return; }
    resetGame(); tips.style.display = 'none'; menu.style.display = 'none'; running = true; showMobileControls(true);
  });

  document.addEventListener('keydown', (e) => {
    const code = e.code;
    if(code === 'KeyP' && running && !gameOver) isPaused = !isPaused;
    if(code === 'KeyQ' && running && isPaused){ running = false; isPaused = false; showMenuForModeSelection(); }
    if(['KeyW','KeyA','KeyS','KeyD','ShiftLeft','Space'].includes(code)) e.preventDefault();
    keys.add(code);
  });
  document.addEventListener('keyup', (e) => keys.delete(e.code));
  canvas.addEventListener('mousemove', (e) => {
    const r = canvas.getBoundingClientRect(); mouse.x = (e.clientX - r.left) * (W / r.width); mouse.y = (e.clientY - r.top) * (H / r.height);
  });
  canvas.addEventListener('mousedown', () => {
    if(isTouchDevice) return;
    const myFighter = (pvpRole === 'guest') ? enemyMain : playerMain;
    if(running && !gameOver && !isPaused && myFighter && myFighter.cd <= 0 && myFighter.hp > 0) shoot(myFighter, { x: mouse.x, y: mouse.y });
  });

  if(isTouchDevice && mobileControls){
    const updateJoy = (clientX, clientY) => {
      const rect = joyPad.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = clientX - cx;
      const dy = clientY - cy;
      const len = Math.hypot(dx, dy);
      const maxLen = mobileInput.joyMax;
      const ratio = len > maxLen ? maxLen / len : 1;
      const ox = dx * ratio;
      const oy = dy * ratio;
      mobileInput.moveX = clampJoy(ox / maxLen);
      mobileInput.moveY = clampJoy(oy / maxLen);
      setJoyVisual(ox, oy);
    };

    joyPad.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      mobileInput.joyPointerId = e.pointerId;
      joyPad.setPointerCapture(e.pointerId);
      updateJoy(e.clientX, e.clientY);
    });
    joyPad.addEventListener('pointermove', (e) => {
      if(mobileInput.joyPointerId !== e.pointerId) return;
      e.preventDefault();
      updateJoy(e.clientX, e.clientY);
    });
    const endJoy = (e) => {
      if(mobileInput.joyPointerId !== e.pointerId) return;
      mobileInput.joyPointerId = null;
      resetJoy();
    };
    joyPad.addEventListener('pointerup', endJoy);
    joyPad.addEventListener('pointercancel', endJoy);

    const holdButton = (el, onDown, onUp) => {
      el.addEventListener('pointerdown', (e) => { e.preventDefault(); onDown(); el.setPointerCapture(e.pointerId); });
      el.addEventListener('pointerup', (e) => { e.preventDefault(); onUp(); });
      el.addEventListener('pointercancel', (e) => { e.preventDefault(); onUp(); });
      el.addEventListener('pointerleave', () => { onUp(); });
    };

    holdButton(mobileFire, () => { mobileInput.fireHeld = true; }, () => { mobileInput.fireHeld = false; });
    mobileDash.addEventListener('pointerdown', (e) => { e.preventDefault(); mobileInput.dashTap = true; });
    mobilePause.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      if(running && !gameOver) isPaused = !isPaused;
    });

    canvas.addEventListener('touchstart', (e) => e.preventDefault(), { passive: false });
    canvas.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
  }

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      particles = [];
      trails = [];
      bullets = [];
      rainbowBalls = [];
    }
  });

  showMenuForModeSelection(); showMobileControls(false); requestAnimationFrame(gameLoop);
</script>
</body>
</html>
