<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shorts Battle – Multiplayer Edition</title>
<style>
  :root{
    --bg:#05070b;
    --panel:rgba(12,16,24,.88);
    --line:rgba(255,255,255,.08);
    --txt:#eef5ff;
  }
  html, body {
    margin:0; width:100%; height:100%; overflow:hidden;
    background: radial-gradient(circle at 50% 20%, #111b2d 0%, #05070b 58%, #020304 100%);
    font-family: system-ui, -apple-system, sans-serif;
    color: var(--txt); user-select:none;
  }
  #stage { position: fixed; inset: 0; display:grid; place-items:center; }
  canvas{
    width:min(100vw, calc(100vh * 1.8)); height:min(100vh, calc(100vw / 1.8));
    border-radius:18px; box-shadow:0 30px 90px rgba(0,0,0,.55);
    background: linear-gradient(180deg, #121826 0%, #090d14 100%);
  }
  #hud{ position:fixed; left:16px; top:16px; z-index:4; min-width:270px; display:grid; gap:10px; pointer-events:none; }
  .barWrap{ background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:10px 12px; backdrop-filter: blur(8px); }
  .barLabel{ display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px; }
  .bar{ width:100%; height:14px; background:rgba(255,255,255,.08); border-radius:999px; overflow:hidden; }
  .fill{ height:100%; width:100%; transition:width .08s linear; }
  .playerFill{ background:linear-gradient(90deg, #42d8ff, #9df4ff); }
  .enemyFill{ background:linear-gradient(90deg, #ff516f, #ff9b6e); }

  #menu{ position:fixed; inset:0; z-index:10; background:rgba(0,0,0,.85); display:grid; place-items:center; }
  .card{ width:min(92vw, 520px); background:rgba(10,14,22,.96); border:1px solid rgba(255,255,255,.08); border-radius:24px; padding:26px; }
  .title{ font-size:30px; font-weight:900; margin-bottom:8px; }
  .section{ margin-top:14px; font-size:13px; opacity:.9; font-weight:800; }
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
  .btn{ border:0; border-radius:16px; padding:14px 12px; cursor:pointer; color:white; font-weight:800; transition:all .12s; }
  .btn.blue{ background:linear-gradient(135deg, #1f90ff, #4adfff); }
  .btn.green{ background:linear-gradient(135deg, #1dcf7f, #74ff9c); }
  .btn.gray{ background:rgba(255,255,255,0.1); }
  .btn:disabled{ opacity: 0.3; cursor: not-allowed; }
  
  input { background: #1a1f2b; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; font-size: 16px; }
  #roomInfo { position: fixed; right: 16px; bottom: 16px; font-size: 14px; color: #42d8ff; background: rgba(0,0,0,0.5); padding: 8px 12px; border-radius: 8px; }
</style>
</head>
<body>

<div id="hud">
  <div class="barWrap">
    <div class="barLabel"><span id="playerLabel">You</span><span id="playerHpText">0 / 0</span></div>
    <div class="bar"><div id="playerHpBar" class="fill playerFill"></div></div>
  </div>
  <div class="barWrap">
    <div class="barLabel"><span id="enemyLabel">Waiting...</span><span id="enemyHpText">0 / 0</span></div>
    <div class="bar"><div id="enemyHpBar" class="fill enemyFill"></div></div>
  </div>
</div>

<div id="menu">
  <div class="card">
    <div class="title">球球戰爭：聯機版</div>
    
    <div class="section">第一步：聯機設定</div>
    <div class="grid">
      <input type="text" id="roomInput" placeholder="輸入房間號碼">
      <button class="btn blue" id="joinRoomBtn">加入房間</button>
      <button class="btn green" id="createRoomBtn" style="grid-column: span 2;">創建新房間</button>
    </div>

    <div id="roleSection" style="display:none; margin-top: 20px;">
      <div class="section">第二步：選擇角色</div>
      <div class="grid">
        <button class="btn blue" data-pick="blue">Blue Mage</button>
        <button class="btn red" data-pick="red" style="background: #ff3e62;">Red Knight</button>
      </div>
      <button class="btn green" id="startBtn" style="width: 100%; margin-top: 15px;" disabled>進入戰場</button>
    </div>
    
    <div id="statusText" style="margin-top: 15px; font-size: 12px; color: #aaa; text-align: center;">請先完成聯機設定</div>
  </div>
</div>

<div id="roomInfo">未連線</div>
<div id="stage"><canvas id="c" width="900" height="500"></canvas></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, onValue, onDisconnect, update, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD8l8YJMU1Pupj66qZG4LNMUC4sEEaDk-8",
    authDomain: "shogig-4229a.firebaseapp.com",
    projectId: "shogig-4229a",
    storageBucket: "shogig-4229a.firebasestorage.app",
    messagingSenderId: "943333196173",
    appId: "1:943333196173:web:a74d48b2205948f4273dc4",
    measurementId: "G-K2M15YM12Q"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // --- 遊戲引擎變數 ---
  const W = 900, H = 500;
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const keys = new Set();
  let mouse = { x: W/2, y: H/2 };
  let running = false, playerId = null, opponentId = null, currentRoomId = null;
  let playerMain = null, enemyMain = null, bullets = [], particles = [];

  const presets = {
    blue: { name:'Blue Mage', color:'#4adfff', hp:100, speed:3.2, shotCd:20, dashPower:9, role:'blue' },
    red:  { name:'Red Knight', color:'#ff516f', hp:110, speed:2.8, shotCd:24, dashPower:8.5, role:'red' }
  };

  // --- 聯機核心邏輯 ---
  function connect(roomId) {
    currentRoomId = roomId;
    document.getElementById('roomInfo').textContent = `房間: ${roomId}`;
    document.getElementById('statusText').textContent = "連線成功，請選擇角色。";
    document.getElementById('roleSection').style.display = 'block';

    const roomRef = ref(db, `rooms/${roomId}`);
    
    // 監聽房間狀態
    onValue(roomRef, (snapshot) => {
      const data = snapshot.val();
      if (!playerId) {
        if (!data || !data.player1) playerId = 'player1', opponentId = 'player2';
        else if (!data.player2) playerId = 'player2', opponentId = 'player1';
        else return alert("房間已滿");
        onDisconnect(ref(db, `rooms/${roomId}/${playerId}`)).remove();
      }

      // 同步對手數據
      if (data && data[opponentId]) {
        const d = data[opponentId];
        if (!enemyMain) {
          enemyMain = makeFighter(presets[d.role || 'blue'], d.x, d.y, 'enemy');
        }
        enemyMain.x = d.x; enemyMain.y = d.y; enemyMain.hp = d.hp;
      }
    });

    // 監聽子彈事件
    const eventsRef = ref(db, `rooms/${roomId}/events`);
    onValue(eventsRef, (snapshot) => {
      const events = snapshot.val();
      if (!events) return;
      Object.keys(events).forEach(id => {
        const ev = events[id];
        if (ev.owner === opponentId && !ev.done) {
          shoot(enemyMain, {x: ev.ax, y: ev.ay}, false);
          update(ref(db, `rooms/${roomId}/events/${id}`), { done: true });
        }
      });
    });
  }

  function uploadStatus() {
    if (running && playerMain && currentRoomId) {
      update(ref(db, `rooms/${currentRoomId}/${playerId}`), {
        x: playerMain.x, y: playerMain.y, hp: playerMain.hp, role: playerMain.role
      });
    }
  }

  // --- 遊戲功能函數 ---
  function makeFighter(p, x, y, team) {
    return { ...p, x, y, vx:0, vy:0, r:18, invuln:0, team, cd:0 };
  }

  function shoot(f, target, upload = true) {
    if (!f || f.hp <= 0) return;
    const dx = target.x - f.x, dy = target.y - f.y;
    const d = Math.hypot(dx, dy) || 1;
    const b = { x: f.x, y: f.y, vx: (dx/d)*6, vy: (dy/d)*6, r:5, color: f.color, owner: f };
    bullets.push(b);
    if (upload && currentRoomId) {
      push(ref(db, `rooms/${currentRoomId}/events`), { owner: playerId, ax: target.x, ay: target.y, done: false });
    }
  }

  function update() {
    if (!running) return;
    
    // 控制自己
    if (playerMain && playerMain.hp > 0) {
      if (keys.has('KeyW')) playerMain.vy -= 0.5;
      if (keys.has('KeyS')) playerMain.vy += 0.5;
      if (keys.has('KeyA')) playerMain.vx -= 0.5;
      if (keys.has('KeyD')) playerMain.vx += 0.5;
      playerMain.x += playerMain.vx; playerMain.y += playerMain.vy;
      playerMain.vx *= 0.9; playerMain.vy *= 0.9;
      uploadStatus();
    }

    // 子彈物理
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx; b.y += b.vy;
      
      const target = b.owner === playerMain ? enemyMain : playerMain;
      if (target && Math.hypot(b.x - target.x, b.y - target.y) < 20) {
        target.hp -= 5;
        bullets.splice(i, 1);
      }
      if (b.x < 0 || b.x > W || b.y < 0 || b.y > H) bullets.splice(i, 1);
    }
    
    // 更新 UI
    if (playerMain) {
        document.getElementById('playerHpBar').style.width = playerMain.hp + '%';
        document.getElementById('playerHpText').textContent = `${Math.max(0, playerMain.hp)} / 100`;
    }
    if (enemyMain) {
        document.getElementById('enemyHpBar').style.width = enemyMain.hp + '%';
        document.getElementById('enemyHpText').textContent = `${Math.max(0, enemyMain.hp)} / 100`;
        document.getElementById('enemyLabel').textContent = "Enemy Player";
    }
  }

  function draw() {
    ctx.fillStyle = '#090d14'; ctx.fillRect(0,0,W,H);
    if (playerMain && playerMain.hp > 0) {
      ctx.fillStyle = playerMain.color; ctx.beginPath(); ctx.arc(playerMain.x, playerMain.y, 18, 0, Math.PI*2); ctx.fill();
    }
    if (enemyMain && enemyMain.hp > 0) {
      ctx.fillStyle = enemyMain.color; ctx.beginPath(); ctx.arc(enemyMain.x, enemyMain.y, 18, 0, Math.PI*2); ctx.fill();
    }
    bullets.forEach(b => {
      ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI*2); ctx.fill();
    });
  }

  function loop() { update(); draw(); requestAnimationFrame(loop); }

  // --- 事件監聽 ---
  document.getElementById('createRoomBtn').onclick = () => connect(Math.floor(1000 + Math.random()*9000).toString());
  document.getElementById('joinRoomBtn').onclick = () => {
    const id = document.getElementById('roomInput').value;
    if (id) connect(id); else alert("請輸入房間號");
  };

  let selectedRole = 'blue';
  document.querySelectorAll('[data-pick]').forEach(b => b.onclick = () => {
    selectedRole = b.dataset.pick;
    document.getElementById('startBtn').disabled = false;
  });

  document.getElementById('startBtn').onclick = () => {
    const startPos = playerId === 'player1' ? {x:100, y:H/2} : {x:W-100, y:H/2};
    playerMain = makeFighter(presets[selectedRole], startPos.x, startPos.y, 'player');
    document.getElementById('menu').style.display = 'none';
    running = true;
  };

  window.onkeydown = e => keys.add(e.code);
  window.onkeyup = e => keys.delete(e.code);
  canvas.onmousedown = () => { if(running) shoot(playerMain, mouse); };
  canvas.onmousemove = e => {
    const r = canvas.getBoundingClientRect();
    mouse.x = (e.clientX - r.left) * (W/r.width);
    mouse.y = (e.clientY - r.top) * (H/r.height);
  };

  loop();
</script>
</body>
</html>
