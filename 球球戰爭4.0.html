<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Shorts Battle – 終極完整版 (殭屍+連線+彩虹球修復)</title>
<style>
  :root{
    --bg:#05070b;
    --panel:rgba(12,16,24,.88);
    --line:rgba(255,255,255,.08);
    --txt:#eef5ff;
  }
  html, body {
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background: radial-gradient(circle at 50% 20%, #111b2d 0%, #05070b 58%, #020304 100%);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
    color: var(--txt);
    user-select:none;
    touch-action: none;
  }
  #stage {
    position: fixed;
    inset: 0;
    display:grid;
    place-items:center;
  }
  canvas{
    width:min(100vw, calc(100vh * 1.8));
    height:min(100vh, calc(100vw / 1.8));
    max-width:100vw;
    max-height:100vh;
    border-radius:18px;
    box-shadow:0 30px 90px rgba(0,0,0,.55);
    background: linear-gradient(180deg, #121826 0%, #090d14 100%);
  }
  #hud{
    position:fixed;
    left:16px;
    top:16px;
    z-index:4;
    min-width:240px;
    display:grid;
    gap:10px;
    pointer-events:none;
  }
  .barWrap{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:8px 12px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
    backdrop-filter: blur(8px);
  }
  .barLabel{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:12px;
    margin-bottom:4px;
    font-weight: bold;
  }
  .bar{
    width:100%;
    height:12px;
    background:rgba(255,255,255,.08);
    border-radius:999px;
    overflow:hidden;
  }
  .fill{
    height:100%;
    width:100%;
    border-radius:999px;
    transition:width .08s linear;
  }
  .playerFill{ background:linear-gradient(90deg, #42d8ff, #9df4ff); }
  .enemyFill{ background:linear-gradient(90deg, #ff516f, #ff9b6e); }
  .zombieFill{ background:linear-gradient(90deg, #8fbc8f, #556b2f); }

  #tips{
    position:fixed;
    right:16px;
    top:16px;
    z-index:4;
    max-width:300px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:12px 14px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
    backdrop-filter: blur(8px);
    font-size:13px;
    line-height:1.5;
  }
  #menu{
    position:fixed;
    inset:0;
    z-index:10;
    background:rgba(0,0,0,.72);
    display:grid;
    place-items:center;
  }
  .card{
    width:min(92vw, 520px);
    background:rgba(10,14,22,.96);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    padding:26px;
    box-shadow:0 24px 80px rgba(0,0,0,.5);
  }
  .title{
    font-size:30px;
    font-weight:900;
    margin-bottom:8px;
  }
  .sub{
    font-size:14px;
    line-height:1.65;
    opacity:.86;
    margin-bottom:16px;
  }
  .section{
    margin-top:14px;
    font-size:13px;
    opacity:.9;
    font-weight:800;
  }
  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:10px;
  }
  .btn{
    border:0;
    border-radius:16px;
    padding:14px 12px;
    cursor:pointer;
    color:white;
    font-weight:800;
    font-size:15px;
    min-height:62px;
    transition:transform .12s ease, filter .12s ease, outline .12s ease;
  }
  .btn:hover:not(:disabled){ transform:translateY(-1px) scale(1.01); filter:brightness(1.05); }
  .btn:disabled{ opacity:0.5; cursor:not-allowed; filter:grayscale(1); }
  .btn.blue{ background:linear-gradient(135deg, #1f90ff, #4adfff); }
  .btn.red{ background:linear-gradient(135deg, #ff3e62, #ff8b56); }
  .btn.green{ background:linear-gradient(135deg, #1dcf7f, #74ff9c); }
  .btn.purple{ background:linear-gradient(135deg, #8b5dff, #cf7eff); }
  .btn.gray{ background:linear-gradient(135deg, #3b4255, #232937); }
  .btn.zombie{ background:linear-gradient(135deg, #556b2f, #8fbc8f); }

  .small{
    font-size:12px;
    opacity:.74;
    margin-top:14px;
    line-height:1.55;
  }
  #overlay{
    position:fixed;
    inset:0;
    display:none;
    place-items:center;
    pointer-events:none;
    z-index:6;
    background: rgba(0,0,0,0.5);
  }
  #bigMsg{
    font-size:clamp(34px, 6vw, 72px);
    font-weight:900;
    letter-spacing:1px;
    text-shadow:0 0 16px rgba(255,255,255,.35), 0 10px 28px rgba(0,0,0,.85);
    text-align: center;
  }
  .kbd{
    display:inline-block;
    padding:1px 7px;
    border:1px solid rgba(255,255,255,.18);
    border-bottom-width:3px;
    border-radius:7px;
    background:rgba(255,255,255,.06);
    font-size:12px;
    margin:0 2px;
  }
  #restartBtn{
    position:fixed;
    left:50%;
    bottom:18px;
    transform:translateX(-50%);
    z-index:12;
    display:none;
    border:0;
    border-radius:16px;
    padding:12px 18px;
    cursor:pointer;
    color:white;
    font-weight:900;
    font-size:15px;
    background:linear-gradient(135deg, #3b4255, #232937);
    box-shadow:0 12px 30px rgba(0,0,0,.35);
  }
  #restartBtn:hover{ filter:brightness(1.06); }
  .modePicked{ outline:2px solid rgba(255,255,255,.85) !important; box-shadow: 0 0 15px rgba(255,255,255,0.4); }
  
  /* PvP UI */
  .room-input {
    padding: 12px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.1);
    background: #121826;
    color: white;
    font-size: 16px;
    text-align: center;
    width: 100%;
    box-sizing: border-box;
  }
  .room-input:focus { outline: 1px solid #4adfff; }
  #lobbyStatus {
    display: none;
    margin-top: 14px;
    background: rgba(255,255,255,0.06);
    padding: 16px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 15px;
    text-align: center;
  }
  .lobby-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 12px;
  }
  .player-card {
    background: rgba(0,0,0,0.3);
    padding: 10px;
    border-radius: 10px;
  }

  /* 📱 手機特化介面 (搖桿與按鈕) */
  .mobile-only {
    display: none;
  }
  
  @media (max-width: 820px), (pointer: coarse) {
    .mobile-only {
      display: block;
    }
    #tips { display: none !important; }
    
    .joystick-base {
      position: fixed; width: 110px; height: 110px;
      background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 50%; z-index: 5; pointer-events: none;
      transform: translate(-50%, -50%); display: none; backdrop-filter: blur(2px);
    }
    .joystick-stick {
      position: absolute; width: 44px; height: 44px;
      background: linear-gradient(135deg, rgba(255,255,255,0.6), rgba(255,255,255,0.2));
      border-radius: 50%; top: 50%; left: 50%;
      transform: translate(-50%, -50%); box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    
    #mobileDashBtn {
      position: fixed; bottom: 45px; right: 45px;
      width: 72px; height: 72px; background: linear-gradient(135deg, #ff3e62, #ff8b56);
      border-radius: 50%; z-index: 5; display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 14px; color: white;
      box-shadow: 0 8px 20px rgba(255, 62, 98, 0.35); text-shadow: 0 2px 4px rgba(0,0,0,0.3);
      user-select: none;
    }
    #mobileDashBtn:active { transform: scale(0.92); filter: brightness(0.9); }

    #mobilePauseBtn {
      position: fixed; top: 16px; right: 16px;
      width: 48px; height: 48px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 14px; z-index: 5; display: flex; align-items: center; justify-content: center;
      font-weight: 900; color: white; backdrop-filter: blur(8px);
    }

    #menu { padding: 8px; }
    .card {
      width: min(96vw, 520px); max-height: calc(100vh - 16px);
      overflow-y: auto; padding: 14px 14px 104px; border-radius: 18px;
    }
    .title { font-size: 24px; margin-bottom: 6px; }
    .sub { font-size: 12px; line-height: 1.45; margin-bottom: 12px; }
    .grid { gap: 8px; }
    .btn { min-height: 50px; padding: 10px 10px; font-size: 14px; border-radius: 14px; }
    #startBtn {
      position: fixed; left: 50%; bottom: calc(12px + env(safe-area-inset-bottom, 0px));
      transform: translateX(-50%); width: min(92vw, 520px); z-index: 30;
      box-shadow: 0 12px 30px rgba(0,0,0,.45);
    }
  }
</style>
</head>
<body>
<div id="hud">
  <div class="barWrap">
    <div class="barLabel"><span id="playerLabel">Player</span><span id="playerHpText">0 / 0</span></div>
    <div class="bar"><div id="playerHpBar" class="fill playerFill"></div></div>
  </div>
  <div class="barWrap">
    <div class="barLabel"><span id="enemyLabel">Enemy</span><span id="enemyHpText">0 / 0</span></div>
    <div class="bar"><div id="enemyHpBar" class="fill enemyFill"></div></div>
  </div>
</div>

<div id="tips">
  <div style="font-weight:900;margin-bottom:6px;">操作</div>
  <div>
    <span class="kbd">WASD</span> 移動<br>
    <span class="kbd">Space</span> 射擊<br>
    <span class="kbd">Shift</span> 衝刺<br>
    <span class="kbd">P</span> 暫停<br>
    滑鼠瞄準。子彈2秒後自動消失。彩虹球會持續 10 秒並每 2 秒發射一次追蹤子彈。
  </div>
</div>

<div id="joyMoveBase" class="joystick-base mobile-only"><div id="joyMoveStick" class="joystick-stick"></div></div>
<div id="joyAimBase" class="joystick-base mobile-only"><div id="joyAimStick" class="joystick-stick"></div></div>
<div id="mobileDashBtn" class="mobile-only">DASH</div>
<div id="mobilePauseBtn" class="mobile-only">P</div>

<button id="restartBtn">重新開始</button>

<div id="overlay"><div id="bigMsg"></div></div>

<div id="menu">
  <div class="card">
    <div class="title">Shorts Battle</div>
    <div class="sub">紅色傷害高，藍色射速快，綠色吸血，紫色有蛇行魔法與彩虹球。</div>

    <div class="section">先選模式</div>
    <div class="grid">
      <button class="btn gray" data-mode="solo">單挑 1v1</button>
      <button class="btn gray" data-mode="team">隊友 2v2</button>
      <button class="btn green" data-mode="zombie_mode">防守 殭屍模式</button>
      <button class="btn purple" data-mode="pvp">真人 1v1 連線</button>
    </div>
    <div id="modeSummary" class="small">請先選擇一個模式。</div>

    <div id="pvpSection" style="display:none; margin-top: 14px;">
      <div class="section">房間操作</div>
      <div class="grid" id="roomBtnGroup">
        <button class="btn blue" id="createRoomBtn">建立房間</button>
        <button class="btn green" id="joinRoomBtn">加入房間</button>
      </div>
      <div id="roomArea" style="margin-top:14px; text-align:center; display:none;">
        <div id="roomCodeDisplay" style="font-size:20px; font-weight:bold; color:#4adfff; margin-bottom:10px;"></div>
        <div style="display:flex; gap:10px; justify-content:center;">
          <input type="text" id="roomCodeInput" class="room-input" placeholder="輸入4位代碼" maxlength="4" style="width:140px;">
          <button class="btn blue" id="confirmJoinBtn" style="min-height:auto; padding:0 20px;">進入</button>
        </div>
      </div>
    </div>

    <div id="lobbyStatus"></div>

    <div id="roleSection" style="display:none;">
      <div class="section">選擇你的角色</div>
      <div class="grid">
        <button class="btn blue" data-pick="blue">Blue Mage</button>
        <button class="btn red" data-pick="red">Red Knight</button>
        <button class="btn green" data-pick="green">Green Vampire</button>
        <button class="btn purple" data-pick="purple">Purple Mage</button>
        <button class="btn zombie" id="btnZombiePick" data-pick="zombie" style="grid-column: span 2;" disabled>🔒 殭屍球 (通關殭屍模式解鎖)</button>
      </div>

      <div id="allySection" style="display:none; margin-top: 14px;">
        <div class="section">選擇隊友的角色</div>
        <div class="grid">
          <button class="btn blue" data-ally-pick="blue">Blue Mage</button>
          <button class="btn red" data-ally-pick="red">Red Knight</button>
          <button class="btn green" data-ally-pick="green">Green Vampire</button>
          <button class="btn purple" data-ally-pick="purple">Purple Mage</button>
          <button class="btn zombie" id="btnAllyZombiePick" data-ally-pick="zombie" style="grid-column: span 2;" disabled>🔒 殭屍球 (通關殭屍模式解鎖)</button>
        </div>
      </div>

      <div class="grid" style="margin-top:14px;">
        <button class="btn gray" id="startBtn" disabled>開始遊戲</button>
        <button class="btn gray" id="clearBtn">重選模式</button>
      </div>
    </div>
  </div>
</div>

<div id="stage"><canvas id="c" width="900" height="500"></canvas></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, update, onDisconnect, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD8l8YJMU1Pupj66qZG4LNMUC4sEEaDk-8",
    authDomain: "shogig-4229a.firebaseapp.com",
    projectId: "shogig-4229a",
    storageBucket: "shogig-4229a.firebasestorage.app",
    messagingSenderId: "943333196173",
    appId: "1:943333196173:web:a74d48b2205948f4273dc4",
    measurementId: "G-K2M15YM12Q",
    databaseURL: "https://shogig-4229a-default-rtdb.firebaseio.com"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const W = 900, H = 500;
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  const menu = document.getElementById('menu');
  const startBtn = document.getElementById('startBtn');
  const clearBtn = document.getElementById('clearBtn');
  const restartBtn = document.getElementById('restartBtn');
  const overlay = document.getElementById('overlay');
  const bigMsg = document.getElementById('bigMsg');
  const tips = document.getElementById('tips');
  const roleSection = document.getElementById('roleSection');
  const allySection = document.getElementById('allySection');
  const pvpSection = document.getElementById('pvpSection');
  const lobbyStatus = document.getElementById('lobbyStatus');
  const modeSummary = document.getElementById('modeSummary');

  const playerLabel = document.getElementById('playerLabel');
  const enemyLabel = document.getElementById('enemyLabel');
  const playerHpBar = document.getElementById('playerHpBar');
  const enemyHpBar = document.getElementById('enemyHpBar');
  const playerHpText = document.getElementById('playerHpText');
  const enemyHpText = document.getElementById('enemyHpText');

  const keys = new Set();
  let mouse = { x: W * 0.5, y: H * 0.5 };

  let unlockedZombie = localStorage.getItem('shorts_zombie_unlocked') === 'true';

  function updateUnlockUI() {
    if (unlockedZombie) {
      const btnP = document.getElementById('btnZombiePick');
      const btnA = document.getElementById('btnAllyZombiePick');
      btnP.disabled = false; btnP.textContent = 'Zombie Boss (殭屍球)';
      btnA.disabled = false; btnA.textContent = 'Zombie Boss (殭屍球)';
    }
  }
  updateUnlockUI();

  const presets = {
    blue:   { name:'Blue Mage',     color:'#4adfff', hp:100, speed:3.15, shotCd:20, dashPower:9.4, role:'blue' },
    red:    { name:'Red Knight',    color:'#ff516f', hp:110, speed:2.8,  shotCd:24, dashPower:8.8, role:'red' },
    green:  { name:'Green Vampire', color:'#5cff8f', hp:105, speed:2.95, shotCd:22, dashPower:8.9, role:'green' },
    purple: { name:'Purple Mage',   color:'#b07cff', hp:95,  speed:3.0,  shotCd:21, dashPower:9.0, role:'purple' },
    zombie: { name:'Zombie Boss',   color:'#8fbc8f', hp:130, speed:2.8,  shotCd:300, dashPower:8.5, role:'zombie' } 
  };

  let selectedKey = null, selectedAllyKey = null, selectedMode = null; 
  let running = false, gameOver = false, isPaused = false, shake = 0;

  let playerMain = null, enemyMain = null;
  let playerTeam = [], enemyTeam = [];
  let bullets = [], particles = [], trails = [], rainbowBalls = [];

  let currentWave = 0, waveTimer = 0;
  let roomCode = '', pvpRole = null, lastShotTime = 0, isReady = false;
  let seenShotIds = new Set(), seenRainbowSpawnIds = new Set();

  const MAX_BULLETS = 140, MAX_PARTICLES = 260, MAX_TRAILS = 240, MAX_RAINBOW_BALLS = 8;
  const PVP_SYNC_MS = 25, HUD_SYNC_MS = 100;
  let lastPvpSyncAt = 0, lastHudSyncAt = 0, pvpListeners = [];

  let moveTouchId = null, aimTouchId = null;
  const maxJoyRadius = 55;
  let joystickData = { active: false, startX: 0, startY: 0, curX: 0, curY: 0 };
  let aimJoystickData = { active: false, startX: 0, startY: 0, curX: 0, curY: 0 };

  function rand(min, max){ return Math.random() * (max - min) + min; }
  function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }
  function dist(x1, y1, x2, y2){ return Math.hypot(x1-x2, y1-y2); }
  function circleHit(a, b){ return dist(a.x, a.y, b.x, b.y) <= (a.r + b.r); }
  function alive(team){ return team.filter(f => f.hp > 0); }
  function trimArray(arr, maxLen){ if(arr.length > maxLen) arr.splice(0, arr.length - maxLen); }
  function lerp(a, b, t){ return a + (b - a) * t; }

  function cleanupPvpListeners(){
    while(pvpListeners.length){
      const unsub = pvpListeners.pop();
      try { if(typeof unsub === 'function') unsub(); } catch(e) {}
    }
  }

  function makeFighter(preset, x, y, team, controlled=false, isLeader=false){
    return {
      x, y, vx:0, vy:0, r:18,
      hp:preset.hp, maxHp:preset.hp, color:preset.color, name:preset.name,
      speedBase:preset.speed, shotCdBase:preset.shotCd, dashPower:preset.dashPower, role:preset.role,
      cd:0, dashCd:0, dashTime:0, invuln:0, aiBurst:0,
      team, controlled, isLeader, mx: W/2, my: H/2,
      netX:x, netY:y, netVX:0, netVY:0, netDashTime:0, netMX:W/2, netMY:H/2, netTs:0
    };
  }

  function getBulletSpeed(role){
    if(role === 'red') return 5.5; if(role === 'blue') return 7.4;
    if(role === 'green') return 6.1; return 5.8;
  }

  function teamStats(team){
    let current = 0, max = 0, aliveCount = 0;
    for(const f of team){
      if(f.maxHp > 0){
        max += f.maxHp; if(f.hp > 0) aliveCount++; current += Math.max(0, f.hp);
      }
    }
    return { current, max: max || 1, alive: aliveCount, total: team.length };
  }

  function updateHud(){
    if (selectedMode === 'zombie_mode') {
      const e = teamStats(enemyTeam);
      playerLabel.textContent = playerMain ? playerMain.name : 'Player';
      playerHpText.textContent = playerMain ? `${Math.max(0, Math.round(playerMain.hp))} / ${playerMain.maxHp}` : '0 / 0';
      playerHpBar.style.width = playerMain ? (clamp(playerMain.hp / playerMain.maxHp, 0, 1) * 100).toFixed(1) + '%' : '0%';
      enemyLabel.textContent = currentWave > 0 ? `WAVE ${currentWave} / 10` : 'ZOMBIE WAVE';
      enemyHpText.textContent = `${Math.max(0, Math.round(e.current))} / ${e.max}`;
      enemyHpBar.style.width = (clamp(e.current / e.max, 0, 1) * 100).toFixed(1) + '%';
      document.getElementById('enemyHpBar').className = 'fill zombieFill';
    } else if(selectedMode === 'team' && playerTeam.length && enemyTeam.length){
      const p = teamStats(playerTeam), e = teamStats(enemyTeam);
      playerLabel.textContent = `Player Team (${p.alive}/${p.total})`;
      enemyLabel.textContent = `Enemy Team (${e.alive}/${e.total})`;
      playerHpText.textContent = `${Math.max(0, Math.round(p.current))} / ${p.max}`;
      enemyHpText.textContent = `${Math.max(0, Math.round(e.current))} / ${e.max}`;
      playerHpBar.style.width = (clamp(p.current / p.max, 0, 1) * 100).toFixed(1) + '%';
      enemyHpBar.style.width = (clamp(e.current / e.max, 0, 1) * 100).toFixed(1) + '%';
      document.getElementById('enemyHpBar').className = 'fill enemyFill';
    } else if(playerMain && enemyMain && (selectedMode === 'solo' || selectedMode === 'pvp')){
      playerLabel.textContent = playerMain.name; enemyLabel.textContent = enemyMain.name;
      playerHpText.textContent = `${Math.max(0, Math.round(playerMain.hp))} / ${playerMain.maxHp}`;
      enemyHpText.textContent = `${Math.max(0, Math.round(enemyMain.hp))} / ${enemyMain.maxHp}`;
      playerHpBar.style.width = (clamp(playerMain.hp / playerMain.maxHp, 0, 1) * 100).toFixed(1) + '%';
      enemyHpBar.style.width = (clamp(enemyMain.hp / enemyMain.maxHp, 0, 1) * 100).toFixed(1) + '%';
      document.getElementById('enemyHpBar').className = 'fill enemyFill';

  // === 彩虹球相關功能 (修復) ===
  function createRainbowBall(owner, x, y){
    const ball = {
      x, y, vx: rand(-0.3, 0.3), vy: rand(-0.3, 0.3), r: 13,
      owner, role: 'rainbow', damage: 3, colorIndex: rand(0, Math.PI * 2),
      life: 600, maxLife: 600, attackCd: 0, homeTimer: 0
    };
    rainbowBalls.push(ball); trimArray(rainbowBalls, MAX_RAINBOW_BALLS);
    addParticles(x, y, '#ffffff', 8, 2.2, 16);
    return ball;
  }

  function spawnRainbowBallFromData(owner, data){
    const ball = {
      x: typeof data.x === 'number' ? data.x : owner.x, y: typeof data.y === 'number' ? data.y : owner.y,
      vx: typeof data.vx === 'number' ? data.vx : rand(-0.3, 0.3), vy: typeof data.vy === 'number' ? data.vy : rand(-0.3, 0.3),
      r: typeof data.r === 'number' ? data.r : 13, owner, role: 'rainbow',
      damage: typeof data.damage === 'number' ? data.damage : 3, colorIndex: typeof data.colorIndex === 'number' ? data.colorIndex : rand(0, Math.PI * 2),
      life: typeof data.life === 'number' ? data.life : 600, maxLife: typeof data.maxLife === 'number' ? data.maxLife : 600,
      attackCd: typeof data.attackCd === 'number' ? data.attackCd : 0, homeTimer: 0
    };
    rainbowBalls.push(ball); trimArray(rainbowBalls, MAX_RAINBOW_BALLS);
    return ball;
  }

  function getEnemyListForOwner(owner){
    return owner.team === 'player' ? enemyTeam : playerTeam;
  }

  function createRainbowHomingBullet(owner, x, y, targetOverride = null){
    const candidates = getEnemyListForOwner(owner);
    let target = targetOverride;
    if(!target || target.hp <= 0){
      target = null; let best = Infinity;
      for(const e of candidates){
        if(e.hp <= 0) continue;
        const d = dist(x, y, e.x, e.y);
        if(d < best){ best = d; target = e; }
      }
    }
    if(!target) return null;

    const bullet = {
      x, y, vx: 0, vy: 0, r: 6, color: '#ffffff', owner, life: 180, bounce: 0, damage: 3, role: 'rainbowHoming', target, phase: rand(0, Math.PI * 2)
    };
    bullets.push(bullet); trimArray(bullets, MAX_BULLETS); addParticles(x, y, '#ffffff', 6, 2.0, 14);
    return bullet;
  }

  function updateRainbowBalls(){
    for(let i = rainbowBalls.length - 1; i >= 0; i--){
      const rb = rainbowBalls[i]; rb.life--; rb.attackCd--; rb.colorIndex += 0.14;

      if(rb.life <= 0){
        addParticles(rb.x, rb.y, '#ffffff', 10, 2.0, 16); rainbowBalls.splice(i, 1); continue;
      }

      const candidates = getEnemyListForOwner(rb.owner);
      let target = null; let best = Infinity;
      for(const e of candidates){
        if(e.hp <= 0) continue;
        const d = dist(rb.x, rb.y, e.x, e.y);
        if(d < best){ best = d; target = e; }
      }

      if(!target){ rainbowBalls.splice(i, 1); continue; }

      const dx = target.x - rb.x, dy = target.y - rb.y, d = Math.max(0.001, Math.hypot(dx, dy));
      const follow = 0.18; rb.vx += (dx / d) * follow; rb.vy += (dy / d) * follow;

      const maxSpd = 2.6, sp = Math.hypot(rb.vx, rb.vy);
      if(sp > maxSpd){ rb.vx = (rb.vx / sp) * maxSpd; rb.vy = (rb.vy / sp) * maxSpd; }

      rb.x += rb.vx; rb.y += rb.vy; rb.vx *= 0.98; rb.vy *= 0.98;

      const pad = rb.r + 6;
      if(rb.x < pad){ rb.x = pad; rb.vx *= -0.7; } if(rb.x > W - pad){ rb.x = W - pad; rb.vx *= -0.7; }
      if(rb.y < pad){ rb.y = pad; rb.vy *= -0.7; } if(rb.y > H - pad){ rb.y = H - pad; rb.vy *= -0.7; }

      trails.push({ x: rb.x, y: rb.y, color: `hsl(${(rb.colorIndex * 180 / Math.PI) % 360}, 100%, 70%)`, life: 12, vx: rand(-0.12,0.12), vy: rand(-0.12,0.12) });
      trimArray(trails, MAX_TRAILS);

      if(rb.attackCd <= 0){
        createRainbowHomingBullet(rb.owner, rb.x, rb.y, target); rb.attackCd = 120; // 2秒
      }
    }
  }

  function drawRainbowBalls(){
    for(const rb of rainbowBalls){
      const hue = ((rb.colorIndex * 180 / Math.PI) % 360);
      const grad = ctx.createRadialGradient(rb.x - 3, rb.y - 3, 2, rb.x, rb.y, rb.r + 6);
      grad.addColorStop(0, `hsla(${hue}, 100%, 92%, 1)`); grad.addColorStop(0.45, `hsla(${(hue + 50) % 360}, 100%, 70%, 1)`); grad.addColorStop(1, `hsla(${(hue + 120) % 360}, 100%, 58%, 1)`);
      ctx.save(); ctx.shadowColor = `hsla(${hue}, 100%, 70%, 0.9)`; ctx.shadowBlur = 24; ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(rb.x, rb.y, rb.r, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    }
  }

  function startGame(){
    if(!selectedMode || !selectedKey) return;
    if(selectedMode === 'team' && !selectedAllyKey) return;
    menu.style.display = 'none'; tips.style.display = 'none';
    cleanupPvpListeners();
    lastPvpSyncAt = 0; lastShotTime = ''; seenShotIds = new Set(); seenRainbowSpawnIds = new Set();
    resetGame(); running = true;

    if (selectedMode === 'pvp') {
      const oppPath = (pvpRole === 'guest') ? 'host' : 'guest';
      const oppFighter = (pvpRole === 'guest') ? playerMain : enemyMain;
      const myPath = pvpRole;
      const myFighter = (pvpRole === 'guest') ? enemyMain : playerMain;

      const stateUnsub = onValue(ref(db, `rooms/${roomCode}/${oppPath}`), (snapshot) => {
        const data = snapshot.val();
        if (data && running) {
          if (typeof data.x === 'number') oppFighter.netX = data.x; if (typeof data.y === 'number') oppFighter.netY = data.y;
          if (typeof data.vx === 'number') oppFighter.netVX = data.vx; if (typeof data.vy === 'number') oppFighter.netVY = data.vy;
          if (typeof data.mx === 'number') oppFighter.netMX = data.mx; if (typeof data.my === 'number') oppFighter.netMY = data.my;
          if (typeof data.dashTime === 'number') oppFighter.netDashTime = data.dashTime; if (typeof data.ts === 'number') oppFighter.netTs = data.ts;
        }
      });
      pvpListeners.push(stateUnsub);

      const shotsUnsub = onChildAdded(ref(db, `rooms/${roomCode}/shots/${oppPath}`), (snapshot) => {
        const data = snapshot.val();
        if (!data || !running) return;
        const shotId = data.sid || `${data.ts || 0}_${snapshot.key || ''}`;
        if (seenShotIds.has(shotId)) return;
        seenShotIds.add(shotId);

        if (data.role === 'zombie') {
          shoot(oppFighter, { x: data.mx, y: data.my }, true);
        } else if (typeof data.bx === 'number' && typeof data.by === 'number') {
          spawnNetworkBullet(oppFighter, data);
        } else {
          shoot(oppFighter, { x: data.mx, y: data.my }, true);
        }
      });
      pvpListeners.push(shotsUnsub);

      const eventsRef = ref(db, `rooms/${roomCode}/events`);
      const eventsUnsub = onChildAdded(eventsRef, (snapshot) => {
        const ev = snapshot.val();
        if(!ev || !running) return;

        if (ev.type === 'hit' && ev.target === myPath) {
          myFighter.hp -= ev.damage; myFighter.invuln = 5;
          if (!document.hidden) applyExplosion(myFighter.x, myFighter.y, '#ff516f');
          if (myFighter.hp <= 0 && !gameOver) { updateBullets(); endGame('ENEMY WIN'); }
        } else if (ev.type === 'heal' && ev.target === oppPath) {
          oppFighter.hp = Math.min(oppFighter.maxHp, oppFighter.hp + ev.amount);
          if (!document.hidden) addParticles(oppFighter.x, oppFighter.y, '#5cff8f', 14, 3.2, 18);
        } else if (ev.type === 'rainbow_spawn') {
          const eid = ev.eid || snapshot.key || `${ev.ts || 0}`;
          if (seenRainbowSpawnIds.has(eid)) return;
          seenRainbowSpawnIds.add(eid);
          if (ev.ownerPath === oppPath) spawnRainbowBallFromData(oppFighter, ev);
        }
      });
      pvpListeners.push(eventsUnsub);
    }
  }

  function spawnNetworkBullet(owner, data){
    const bullet = {
      x: typeof data.bx === 'number' ? data.bx : owner.x, y: typeof data.by === 'number' ? data.by : owner.y,

      life: typeof data.life === 'number' ? data.life : 60, bounce: typeof data.bounce === 'number' ? data.bounce : 2,
      damage: typeof data.damage === 'number' ? data.damage : 4, role: data.role || owner.role, phase: typeof data.phase === 'number' ? data.phase : 0, netBullet: true
    };
    bullets.push(bullet); trimArray(bullets, MAX_BULLETS); return bullet;
  }

  function addParticles(x, y, color, count=12, power=3, life=22){
    for(let i=0;i<count;i++){
      const a = rand(0, Math.PI*2), s = rand(power*0.25, power);
      particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: life + rand(-5, 5), maxLife: life + rand(-5, 5), size: rand(1.4, 3.5), color });
      trimArray(particles, MAX_PARTICLES);
    }
  }

  function screenShake(amount){ shake = Math.max(shake, amount); }
  function applyExplosion(x, y, color){ screenShake(8); addParticles(x, y, color, 20, 4.8, 26); }

  function shoot(shooter, aimPoint, ignoreCd = false){
    if((!ignoreCd && shooter.cd > 0) || gameOver || isPaused || shooter.hp <= 0) return;
    const dx = aimPoint.x - shooter.x, dy = aimPoint.y - shooter.y, d = Math.max(0.001, Math.hypot(dx, dy));

    if (shooter.role === 'zombie') {
        let z = makeFighter({name:'小殭屍', color:'#8fbc8f', hp:10, speed:4.8, shotCd:999, dashPower:0, role:'zombie_minion'}, shooter.x + (dx/d)*35, shooter.y + (dy/d)*35, shooter.team, false, false);
        z.r = 10; if(shooter.team === 'player') playerTeam.push(z); else enemyTeam.push(z);
        shooter.cd = shooter.shotCdBase; addParticles(z.x, z.y, shooter.color, 8, 2.5, 14);
        
        const myFighter = (pvpRole === 'guest') ? enemyMain : playerMain;
        if (selectedMode === 'pvp' && shooter === myFighter && !ignoreCd) {
            const sid = `${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
            push(ref(db, `rooms/${roomCode}/shots/${pvpRole}`), { sid, ts: Date.now(), mx: aimPoint.x, my: aimPoint.y, role: 'zombie' });
        }
        return; 
    }

    // 一般子彈與紫球召喚彩虹球機制
    let spawnedRainbow = false;
    const bullet = {
      x: shooter.x + (dx/d) * (shooter.r + 8), y: shooter.y + (dy/d) * (shooter.r + 8),
      vx: (dx/d) * getBulletSpeed(shooter.role), vy: (dy/d) * getBulletSpeed(shooter.role),
      r: 5, color: shooter.color, owner: shooter, life: 60, bounce: 2, damage: 4, role: shooter.role
    };

    if(shooter.role === 'red'){ bullet.r = 9; bullet.damage = 7; } 
    else if(shooter.role === 'green'){ bullet.r = 6; bullet.damage = 3; bullet.healAmount = 3; } 
    else if(shooter.role === 'purple'){ 
      bullet.r = 6; bullet.damage = 5; bullet.phase = rand(0, Math.PI*2); 
      if(Math.random() < 0.15){ createRainbowBall(shooter, shooter.x, shooter.y); spawnedRainbow = true; }
    }

    bullets.push(bullet); trimArray(bullets, MAX_BULLETS); shooter.cd = shooter.shotCdBase;
    addParticles(bullet.x, bullet.y, shooter.color, 6, 2.0, 14);

    const myFighter = (pvpRole === 'guest') ? enemyMain : playerMain;
    if (selectedMode === 'pvp' && shooter === myFighter && !ignoreCd) {
      const sid = `${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
      push(ref(db, `rooms/${roomCode}/shots/${pvpRole}`), {
        sid, ts: Date.now(), bx: bullet.x, by: bullet.y, vx: bullet.vx, vy: bullet.vy,
        r: bullet.r, color: bullet.color, damage: bullet.damage, role: bullet.role,
        bounce: bullet.bounce, life: bullet.life, phase: bullet.phase || 0, mx: aimPoint.x, my: aimPoint.y
      });
      
      if (spawnedRainbow && rainbowBalls.length > 0) {
        const latestBall = rainbowBalls[rainbowBalls.length - 1];
        push(ref(db, `rooms/${roomCode}/events`), {
          type: 'rainbow_spawn', eid: `${sid}_rb`, ts: Date.now(), ownerPath: pvpRole,
          x: latestBall.x, y: latestBall.y, vx: latestBall.vx, vy: latestBall.vy,
          r: latestBall.r, damage: latestBall.damage, life: latestBall.life,
          maxLife: latestBall.maxLife, attackCd: latestBall.attackCd, colorIndex: latestBall.colorIndex
        });
      }
    }
  }

  function predictLead(s, t, spd, bias = 1){
    const d = Math.hypot(t.x - s.x, t.y - s.y);
    const time = clamp(d / Math.max(0.001, spd), 0, 28) * bias;
    return { x: t.x + (t.vx || 0) * time, y: t.y + (t.vy || 0) * time };
  }

  function bulletThreatScore(b, t){
    const rx = t.x - b.x, ry = t.y - b.y, d = Math.hypot(rx, ry), s = Math.hypot(b.vx, b.vy) || 0.001;
    return { distNow: d, dir: (rx * b.vx + ry * b.vy) / (d * s) };
  }

  function chooseTarget(attacker, enemies){
    let best = null, bestScore = Infinity;
    for(const e of enemies){
      if(e.hp <= 0) continue;
      const score = Math.max(0, e.hp) * 7.5 + dist(attacker.x, attacker.y, e.x, e.y) * 0.9;
      if(score < bestScore){ bestScore = score; best = e; }
    }
    return best;
  }

  function chooseAnchor(fighter, friends){
    let best = null, bestDist = Infinity;
    for(const f of friends){
      if(f === fighter || f.hp <= 0) continue;
      const d = dist(fighter.x, fighter.y, f.x, f.y);
      if(d < bestDist){ bestDist = d; best = f; }
    }
    return best;
  }

  function updatePlayerControlled(){
    const p = (selectedMode === 'pvp' && pvpRole === 'guest') ? enemyMain : playerMain;
    if(!p || p.hp <= 0) return;

    const spd = p.dashTime > 0 ? 5.8 : p.speedBase;
    let ax = 0, ay = 0;
    if(keys.has('KeyW')) ay -= 1; if(keys.has('KeyS')) ay += 1;
    if(keys.has('KeyA')) ax -= 1; if(keys.has('KeyD')) ax += 1;

    if (joystickData.active) {
      let dx = joystickData.curX - joystickData.startX, dy = joystickData.curY - joystickData.startY, dist = Math.hypot(dx, dy);
      if (dist > 0.001) { let factor = Math.min(dist / maxJoyRadius, 1.0); ax += (dx / dist) * factor; ay += (dy / dist) * factor; }
    }

    const len = Math.max(0.001, Math.hypot(ax, ay));
    if(ax || ay){ p.vx += (ax/len) * spd * 0.34; p.vy += (ay/len) * spd * 0.34; }

    if(keys.has('ShiftLeft') && p.dashCd <= 0 && p.dashTime <= 0){
      const dx = mouse.x - p.x, dy = mouse.y - p.y, d = Math.max(0.001, Math.hypot(dx, dy));
      p.vx += (dx/d) * p.dashPower; p.vy += (dy/d) * p.dashPower;
      p.dashTime = 10; p.dashCd = 58; p.invuln = 10;
      addParticles(p.x, p.y, '#ffffff', 12, 2.8, 16); screenShake(4);
    }

    if(keys.has('Space') && p.cd <= 0) shoot(p, { x: mouse.x, y: mouse.y });

    if(p.cd > 0) p.cd--; if(p.dashCd > 0) p.dashCd--;
    if(p.dashTime > 0) p.dashTime--; 
    p.vx *= 0.93; p.vy *= 0.93;
  }

  function updateAI(f, enemySide, friendSide){
    if(f.hp <= 0) return;

    if (f.role === 'enemy_zombie' || f.role === 'enemy_boss' || f.role === 'zombie_minion') {
        const target = chooseTarget(f, enemySide);
        if(!target) return;
        const dx = target.x - f.x, dy = target.y - f.y, d = Math.max(0.001, Math.hypot(dx, dy));
        const spd = f.speedBase, jitter = Math.sin(performance.now() * 0.01 + f.x) * 0.5;
        f.vx += (dx/d + jitter*0.1) * spd * 0.15; f.vy += (dy/d + jitter*0.1) * spd * 0.15;
        f.vx *= 0.94; f.vy *= 0.94;
        return;
    }

    const target = chooseTarget(f, enemySide); if(!target) return;
    const spd = getBulletSpeed(f.role), low = f.hp < f.maxHp * 0.38, aim = predictLead(f, target, spd, low ? 1.18 : 1.02);

    let mx = 0, my = 0;
    const dx = target.x - f.x, dy = target.y - f.y, d = Math.max(0.001, Math.hypot(dx, dy));
    const tx = dx/d, ty = dy/d, ax = -tx, ay = -ty, sx = -ty, sy = tx;

    const t = performance.now() * 0.001, orbit = Math.sin(t * 4.3 + f.x * 0.01) * 0.95, jitter = Math.sin(t * 9.2 + f.y * 0.017) * 0.08;
    const ideal = f.role === 'blue' ? 205 : (f.role === 'red' ? 165 : (f.role === 'purple' ? 190 : 180));
    const err = d - (low ? 265 : ideal);

    if(d > (low ? 300 : ideal + 35)){ mx += tx * clamp(err / 110, 0, 1) * 1.25; my += ty * clamp(err / 110, 0, 1) * 1.25; } 
    else if(d < (low ? 235 : ideal - 30)){ mx += ax * clamp((-err) / 110, 0, 1) * 1.15; my += ay * clamp((-err) / 110, 0, 1) * 1.15; }

    mx += sx * orbit; my += sy * orbit;
    if(d < 115){ mx += ax * (low ? 1.9 : 1.45); my += ay * (low ? 1.9 : 1.45); }

    const anchor = chooseAnchor(f, friendSide);
    if(anchor){
      const ancx = anchor.x - f.x, ancy = anchor.y - f.y, ancd = Math.max(0.001, Math.hypot(ancx, ancy));
      const sIdeal = low ? 200 : 145;
      if(ancd > sIdeal + 30){ mx += (ancx / ancd) * 0.65; my += (ancy / ancd) * 0.65; } 
      else if(ancd < 85){ mx -= (ancx / ancd) * 0.5; my -= (ancy / ancd) * 0.5; }
    }

    let nThreat = null, nDist = 9999;
    for(const b of bullets){
      if(b.owner.team === f.team) continue;
      const s = bulletThreatScore(b, f);
      if(s.distNow < nDist){ nDist = s.distNow; nThreat = b; }
    }

    if(nThreat && nDist < (low ? 240 : 190)){
      const bv = Math.hypot(nThreat.vx, nThreat.vy) || 1, bx = nThreat.vx / bv, by = nThreat.vy / bv;
      const rx = f.x - nThreat.x, ry = f.y - nThreat.y, rxn = Math.hypot(rx, ry) || 1;
      const abx = rx / rxn, aby = ry / rxn, px = -by, py = bx;
      const weight = clamp((220 - nDist) / 220, 0.15, 1);
      mx += (abx * 1.6 + px * 1.2) * weight; my += (aby * 1.6 + py * 1.2) * weight;
    }

    mx += Math.cos(t * 3.2 + f.y * 0.02) * 0.14; my += Math.sin(t * 3.8 + f.x * 0.02) * 0.14;
    f.vx += (mx + jitter) * (low ? 0.44 : 0.36); f.vy += (my - jitter) * (low ? 0.44 : 0.36);
    f.aiBurst++;

    if(f.cd <= 0 && d < (low ? 650 : 560) && (d < (low ? 370 : 300) || f.aiBurst > (low ? 14 : 24) || Math.random() < 0.03)){
      shoot(f, aim); f.aiBurst = 0;
    }

    if(f.cd > 0) f.cd--; if(f.dashCd > 0) f.dashCd--;
    if(f.dashTime > 0) f.dashTime--; 
    f.vx *= low ? 0.948 : 0.935; f.vy *= low ? 0.948 : 0.935;
  }

  function updateFighterPhysics(f){
    if(f.hp <= 0) return;

    if(selectedMode === 'pvp' && !f.controlled && typeof f.netX === 'number' && typeof f.netY === 'number'){
      f.x = lerp(f.x, f.netX, 0.35); f.y = lerp(f.y, f.netY, 0.35);
      f.vx = lerp(f.vx, f.netVX || 0, 0.18); f.vy = lerp(f.vy, f.netVY || 0, 0.18);
      if (typeof f.netDashTime === 'number') f.dashTime = f.netDashTime;
    }

    const m = f.dashTime > 0 ? 9.4 : (f.role === 'zombie_minion' ? 5.5 : 4.2), s = Math.hypot(f.vx, f.vy);
    if(s > m){ f.vx = (f.vx / s) * m; f.vy = (f.vy / s) * m; }
    f.x += f.vx; f.y += f.vy;
    const pad = f.r + 6;
    if(f.x < pad){ f.x = pad; f.vx *= -0.6; } if(f.x > W - pad){ f.x = W - pad; f.vx *= -0.6; }
    if(f.y < pad){ f.y = pad; f.vy *= -0.6; } if(f.y > H - pad){ f.y = H - pad; f.vy *= -0.6; }
    f.vx *= 0.985; f.vy *= 0.985;
    
    if (f.invuln > 0) f.invuln--;
  }

  function updateBullets(){
    for(let i = bullets.length - 1; i >= 0; i--){
      const b = bullets[i]; b.life--;

      if(b.role === 'purple'){
        b.phase += 0.18; const px = -b.vy, py = b.vx;
        b.x += b.vx + px * Math.sin(b.phase) * 0.22; b.y += b.vy + py * Math.sin(b.phase) * 0.22;
      } else if (b.role === 'rainbowHoming' && b.target && b.target.hp > 0) {
        const dx = b.target.x - b.x, dy = b.target.y - b.y, d = Math.max(0.001, Math.hypot(dx, dy));
        b.vx += (dx / d) * 0.38; b.vy += (dy / d) * 0.38;
        const sp = Math.hypot(b.vx, b.vy); const maxSpd = 5.2;
        if(sp > maxSpd){ b.vx = (b.vx / sp) * maxSpd; b.vy = (b.vy / sp) * maxSpd; }
        b.x += b.vx; b.y += b.vy; b.phase += 0.2;
      } else { b.x += b.vx; b.y += b.vy; }

      trails.push({ x:b.x, y:b.y, color:b.color, life:10, vx:rand(-0.18,0.18), vy:rand(-0.18,0.18) });
      trimArray(trails, MAX_TRAILS);

      let bounced = false;
      if(b.role !== 'rainbowHoming'){
        if(b.x <= b.r || b.x >= W - b.r){ b.vx *= -1; b.bounce--; bounced = true; }
        if(b.y <= b.r || b.y >= H - b.r){ b.vy *= -1; b.bounce--; bounced = true; }
      }
      if(bounced) addParticles(b.x, b.y, b.color, 7, 2.0, 16);

      const targets = b.owner.team === 'player' ? enemyTeam : playerTeam;
      let hitTarget = null;
      for(const t of targets){
        if(t.hp <= 0) continue;
        if(circleHit(b, t)){ hitTarget = t; break; }
      }

      if(hitTarget && hitTarget.invuln <= 0){
        let shouldDamage = true;
        if (selectedMode === 'pvp') {
          const myFighter = (pvpRole === 'guest') ? enemyMain : playerMain;
          if (b.owner === myFighter) {
            shouldDamage = true;
            const oppPath = (pvpRole === 'guest') ? 'host' : 'guest';
            push(ref(db, `rooms/${roomCode}/events`), { type: 'hit', target: oppPath, damage: b.damage, ts: Date.now() });
          } else {
            shouldDamage = false;
          }
        }
        
        if (shouldDamage) {
            hitTarget.hp -= b.damage; hitTarget.invuln = 5;
            if (b.role === 'green') {
              const healAmt = b.healAmount || b.damage;
              b.owner.hp = Math.min(b.owner.maxHp, b.owner.hp + healAmt);
              addParticles(b.owner.x, b.owner.y, '#5cff8f', 14, 3.2, 18);
              if (selectedMode === 'pvp') {
                 push(ref(db, `rooms/${roomCode}/events`), { type: 'heal', target: pvpRole, amount: healAmt, ts: Date.now() });
              }
            }
        }
        applyExplosion(b.x, b.y, b.color); bullets.splice(i, 1); continue;
      }
      if(b.life <= 0 || b.bounce < -1) bullets.splice(i, 1);
    }
    if(bullets.length > MAX_BULLETS) bullets.splice(0, bullets.length - MAX_BULLETS);
  }

  function updateParticles(){
    for(let i = particles.length - 1; i >= 0; i--){
      const p = particles[i]; p.life--; p.x += p.vx; p.y += p.vy; p.vx *= 0.97; p.vy *= 0.97;
      if(p.life <= 0) particles.splice(i, 1);
    }
    if(particles.length > MAX_PARTICLES) particles.splice(0, particles.length - MAX_PARTICLES);
    for(let i = trails.length - 1; i >= 0; i--){
      const t = trails[i]; t.life--; t.x += t.vx; t.y += t.vy;
      if(t.life <= 0) trails.splice(i, 1);
    }
    if(trails.length > MAX_TRAILS) trails.splice(0, trails.length - MAX_TRAILS);
  }

  function drawBackground(){
    ctx.save(); ctx.fillStyle = '#090d14'; ctx.fillRect(0,0,W,H);
    ctx.globalAlpha = 0.07; ctx.strokeStyle = '#cfe0ff';
    for(let x = 0; x <= W; x += 60){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for(let y = 0; y <= H; y += 60){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
    ctx.globalAlpha = 1;
    const gx = W/2 + Math.sin(performance.now()*0.001)*10, gy = H/2 + Math.cos(performance.now()*0.0012)*8;
    const g = ctx.createRadialGradient(gx, gy, 18, gx, gy, 280);
    g.addColorStop(0, 'rgba(80,220,255,.06)'); g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H); ctx.restore();
  }

  function drawFighter(f){
    if(!f || f.hp <= 0) return;
    ctx.save(); ctx.shadowColor = f.color; ctx.shadowBlur = 22; ctx.fillStyle = f.invuln > 0 ? '#ffffff' : f.color;
    ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2); ctx.fill();

    ctx.shadowBlur = 0; ctx.fillStyle = 'rgba(255,255,255,.9)'; ctx.beginPath();
    const eyeOffsetX = (selectedMode === 'pvp' && pvpRole === 'guest' && !f.controlled) ? -5 : (f.controlled ? 5 : -5);
    ctx.arc(f.x + eyeOffsetX, f.y - 4, f.role==='enemy_boss'?5:2.7, 0, Math.PI * 2); ctx.fill();

    if(f.dashTime > 0){
      ctx.strokeStyle = 'rgba(255,255,255,.45)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(f.x, f.y, f.r + 6, 0, Math.PI*2); ctx.stroke();
    }
    
    if (f.controlled || f.role === 'enemy_boss' || f.isLeader) {
        ctx.fillStyle = 'rgba(255,255,255,.85)'; ctx.font = '12px system-ui, sans-serif'; ctx.textAlign = 'center'; 
        ctx.fillText(f.controlled ? 'YOU' : f.name, f.x, f.y - (f.r + 8)); 
    }
    ctx.restore();
  }

  function drawBullets(){
    for(const b of bullets){
      ctx.save(); ctx.shadowColor = b.color; ctx.shadowBlur = b.role === 'purple' ? 20 : (b.role === 'rainbowHoming' ? 24 : 16);
      ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
      if (b.role === 'rainbowHoming') {
        ctx.shadowBlur = 0; ctx.globalAlpha = 0.65; ctx.strokeStyle = 'rgba(255,255,255,.85)';
        ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(b.x, b.y, b.r + 2, 0, Math.PI*2); ctx.stroke();
      }
      ctx.restore();
    }
  }

  function drawParticles(){
    for(const t of trails){
      const a = Math.max(0, t.life / 10); ctx.save(); ctx.globalAlpha = a * 0.55; ctx.fillStyle = t.color;
      ctx.beginPath(); ctx.arc(t.x, t.y, 2.1, 0, Math.PI*2); ctx.fill(); ctx.restore();
    }
    for(const p of particles){
      const a = Math.max(0, p.life / p.maxLife); ctx.save(); ctx.globalAlpha = a; ctx.shadowColor = p.color; ctx.shadowBlur = 10;
      ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); ctx.restore();
    }
  }

  function render(){
    drawBackground(); drawParticles(); drawBullets(); drawRainbowBalls();
    for(let f of playerTeam) drawFighter(f);
    for(let f of enemyTeam) drawFighter(f);

    if(isPaused) {
        ctx.save(); ctx.fillStyle = 'rgba(0, 0, 0, 0.65)'; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#ffffff'; ctx.font = 'bold 50px system-ui, sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('PAUSED', W/2, H/2 - 20); ctx.font = '20px system-ui, sans-serif'; ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
        ctx.fillText('按 P 鍵繼續遊戲', W/2, H/2 + 25); ctx.restore();
    }
  }

  function applyShake(){
    if(shake > 0.15){ ctx.setTransform(1,0,0,1, rand(-shake, shake), rand(-shake, shake)); shake *= 0.88; }
    else{ ctx.setTransform(1,0,0,1,0,0); shake = 0; }
  }

  function gameLoop(){
    if(running){
      if(!gameOver && !isPaused){
        updatePlayerControlled();
        
        if (selectedMode === 'pvp') {
          const myFighter = (pvpRole === 'guest') ? enemyMain : playerMain;
          const myPath = (pvpRole === 'guest') ? 'guest' : 'host';
          const now = performance.now();
          if (now - lastPvpSyncAt >= PVP_SYNC_MS) {
            lastPvpSyncAt = now;
            update(ref(db, `rooms/${roomCode}/${myPath}`), { x: myFighter.x, y: myFighter.y, vx: myFighter.vx, vy: myFighter.vy, mx: mouse.x, my: mouse.y, dashTime: myFighter.dashTime, ts: Date.now() });
          }
        }
        
        if (selectedMode === 'zombie_mode') {
            let aliveEnemies = enemyTeam.filter(e => e.hp > 0).length;
            if (playerMain.hp <= 0) endGame('<span style="color:#ff3e62">YOU DIED</span>');
            else if (aliveEnemies === 0 && waveTimer <= 0) {
                if (currentWave >= 10) {
                    localStorage.setItem('shorts_zombie_unlocked', 'true'); unlockedZombie = true; updateUnlockUI();
                    endGame('<span style="color:#5cff8f">防守成功！</span><br><span style="font-size:24px;">解鎖隱藏角色：殭屍球！</span>', true);
                } else waveTimer = 90;
            }
            if (waveTimer > 0) { waveTimer--; if (waveTimer === 0 && currentWave < 10) spawnZombieWave(currentWave + 1); }
        } else {
            if(alive(playerTeam).length === 0) endGame('ENEMY WIN');
            else if(alive(enemyTeam).length === 0) endGame('PLAYER WIN');
        }

        for (let p of playerTeam) {
            if(p.hp <= 0) continue;
            for (let e of enemyTeam) {
                if(e.hp <= 0) continue;
                if (circleHit(p, e)) {
                    if (p.role === 'zombie_minion') {
                        let dmg = p.hp; let applyDmg = true;
                        if (selectedMode === 'pvp') push(ref(db, `rooms/${roomCode}/events`), { type: 'hit', target: pvpRole === 'guest' ? 'host' : 'guest', damage: dmg, ts: Date.now() });
                        if (applyDmg) { e.hp -= dmg; e.invuln = 5; }
                        p.hp = 0; applyExplosion(p.x, p.y, p.color);
                    } else if (e.role === 'enemy_zombie' || e.role === 'enemy_boss' || e.role === 'zombie_minion') {
                        if (p.invuln <= 0) {
                            let dmg = e.role === 'zombie_minion' ? e.hp : 10; let applyDmg = true;
                            if (selectedMode === 'pvp') applyDmg = false; 
                            if (applyDmg) { p.hp -= dmg; p.invuln = 15; applyExplosion(p.x, p.y, '#ff3e62'); }
                            if (e.role === 'zombie_minion') { e.hp = 0; applyExplosion(e.x, e.y, e.color); } 
                            else if (applyDmg) {
                                let dx = p.x - e.x, dy = p.y - e.y, d = Math.hypot(dx, dy) || 1;
                                p.vx += (dx/d)*8; p.vy += (dy/d)*8; e.vx -= (dx/d)*3; e.vy -= (dy/d)*3;
                            }
                        }
                    }
                }
            }
        }

        playerTeam = playerTeam.filter(f => f.hp > 0 || f.isLeader);
        enemyTeam = enemyTeam.filter(f => f.hp > 0 || f.isLeader);

        if(selectedMode !== 'pvp') {
            for(const f of playerTeam){ if(!f.controlled) updateAI(f, enemyTeam, playerTeam); }
            for(const f of enemyTeam){ updateAI(f, playerTeam, enemyTeam); }
        } else {
            const myFighter = (pvpRole === 'guest') ? enemyMain : playerMain;
            for(const f of playerTeam){ if(f.role === 'zombie_minion' && f.team === myFighter.team) updateAI(f, enemyTeam, playerTeam); }
        }

        for(const f of playerTeam) updateFighterPhysics(f);
        for(const f of enemyTeam) updateFighterPhysics(f);

        updateBullets(); updateRainbowBalls(); updateParticles();
      }
    }
    const now = performance.now(); if(now - lastHudSyncAt >= HUD_SYNC_MS){ lastHudSyncAt = now; updateHud(); }
    render(); applyShake(); requestAnimationFrame(gameLoop);
  }

  function listenToLobby() {
    onValue(ref(db, `rooms/${roomCode}`), (snapshot) => {
      const data = snapshot.val();
      if (!data) return;

      if (data.status === 'lobby') {
        lobbyStatus.style.display = 'block';
        const hostRole = data.host?.role ? presets[data.host.role].name : '選擇中...';
        const guestRole = data.guest?.role ? presets[data.guest.role].name : '等待加入...';
        const hostRdy = data.host?.ready ? '<span style="color:#5cff8f;font-weight:bold;">已準備 ✔</span>' : '<span style="color:#ff516f">準備中...</span>';
        const guestRdy = data.guest?.ready ? '<span style="color:#5cff8f;font-weight:bold;">已準備 ✔</span>' : '<span style="color:#ff516f">準備中...</span>';

        lobbyStatus.innerHTML = `
          <div style="font-size:20px; font-weight:bold; color:#4adfff;">大廳代碼: ${roomCode}</div>
          <div class="lobby-grid">
            <div class="player-card">
              <div style="color:#aaa; font-size:12px;">房主 (Host)</div>
              <div style="font-weight:bold; font-size:16px; margin:6px 0;">${hostRole}</div>
              ${hostRdy}
            </div>
            <div class="player-card">
              <div style="color:#aaa; font-size:12px;">對手 (Guest)</div>
              <div style="font-weight:bold; font-size:16px; margin:6px 0;">${guestRole}</div>
              ${guestRdy}
            </div>
          </div>
        `;

        if (data.host?.ready && data.guest?.ready && pvpRole === 'host') {
           update(ref(db, `rooms/${roomCode}`), { status: 'playing' });
        }
      } else if (data.status === 'playing' && !running) {
        selectedKey = data.host.role;
        selectedAllyKey = data.guest.role;
        startGame();
      }
    });
  }

  document.addEventListener('keydown', (e) => {
    const code = e.code;
    if(code === 'KeyP' && running && !gameOver) isPaused = !isPaused;
    if(code === 'KeyQ' && running && isPaused){ running = false; isPaused = false; showMenuForModeSelection(); }
    if(['KeyW','KeyA','KeyS','KeyD','ShiftLeft','Space'].includes(code)) e.preventDefault();
    keys.add(code);
  });
  document.addEventListener('keyup', (e) => keys.delete(e.code));
  
  canvas.addEventListener('mousemove', (e) => {
    const r = canvas.getBoundingClientRect(); mouse.x = (e.clientX - r.left) * (W / r.width); mouse.y = (e.clientY - r.top) * (H / r.height);
  });
  canvas.addEventListener('mousedown', () => {
    const myFighter = (pvpRole === 'guest') ? enemyMain : playerMain;
    if(running && !gameOver && !isPaused && myFighter && myFighter.cd <= 0 && myFighter.hp > 0) shoot(myFighter, { x: mouse.x, y: mouse.y });
  });

  const joyMoveBase = document.getElementById('joyMoveBase'), joyMoveStick = document.getElementById('joyMoveStick');
  const joyAimBase = document.getElementById('joyAimBase'), joyAimStick = document.getElementById('joyAimStick');
  const mobileDashBtn = document.getElementById('mobileDashBtn'), mobilePauseBtn = document.getElementById('mobilePauseBtn');

  document.addEventListener('touchstart', (e) => {
    if (!running || gameOver || isPaused) return;
    for (let touch of e.changedTouches) {
      if (touch.clientX < window.innerWidth / 2 && moveTouchId === null) {
        moveTouchId = touch.identifier; joystickData.active = true;
        joystickData.startX = touch.clientX; joystickData.startY = touch.clientY;
        joystickData.curX = touch.clientX; joystickData.curY = touch.clientY;
        updateJoyUI(joyMoveBase, joyMoveStick, joystickData);
      } else if (touch.clientX >= window.innerWidth / 2 && aimTouchId === null) {
        const dashRect = mobileDashBtn.getBoundingClientRect();
        if (touch.clientX >= dashRect.left && touch.clientX <= dashRect.right && touch.clientY >= dashRect.top && touch.clientY <= dashRect.bottom) continue;
        aimTouchId = touch.identifier; aimJoystickData.active = true;
        aimJoystickData.startX = touch.clientX; aimJoystickData.startY = touch.clientY;
        aimJoystickData.curX = touch.clientX; aimJoystickData.curY = touch.clientY;
        updateJoyUI(joyAimBase, joyAimStick, aimJoystickData);
        keys.add('Space'); 
      }
    }
  });

  document.addEventListener('touchmove', (e) => {
    for (let touch of e.changedTouches) {
      if (touch.identifier === moveTouchId) {
        joystickData.curX = touch.clientX; joystickData.curY = touch.clientY;
        updateJoyUI(joyMoveBase, joyMoveStick, joystickData);
      } else if (touch.identifier === aimTouchId) {
        aimJoystickData.curX = touch.clientX; aimJoystickData.curY = touch.clientY;
        updateJoyUI(joyAimBase, joyAimStick, aimJoystickData); calculateAimVector();
      }
    }
  });

  document.addEventListener('touchend', (e) => {
    for (let touch of e.changedTouches) {
      if (touch.identifier === moveTouchId) {
        moveTouchId = null; joystickData.active = false; joyMoveBase.style.display = 'none';
      } else if (touch.identifier === aimTouchId) {
        aimTouchId = null; aimJoystickData.active = false; joyAimBase.style.display = 'none'; keys.delete('Space');
      }
    }
  });

  function updateJoyUI(base, stick, data) {
    if (!data.active) { base.style.display = 'none'; return; }
    base.style.display = 'block'; base.style.left = data.startX + 'px'; base.style.top = data.startY + 'px';
    let dx = data.curX - data.startX, dy = data.curY - data.startY, dist = Math.hypot(dx, dy);
    if (dist > maxJoyRadius) { dx = (dx / dist) * maxJoyRadius; dy = (dy / dist) * maxJoyRadius; }
    stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  }

  function calculateAimVector() {
    let dx = aimJoystickData.curX - aimJoystickData.startX, dy = aimJoystickData.curY - aimJoystickData.startY, dist = Math.hypot(dx, dy);
    const myFighter = (pvpRole === 'guest') ? enemyMain : playerMain;
    if (dist > 5 && myFighter) { const factor = 200 / dist; mouse.x = myFighter.x + dx * factor; mouse.y = myFighter.y + dy * factor; }
  }

  mobileDashBtn.addEventListener('touchstart', (e) => { e.preventDefault(); keys.add('ShiftLeft'); });
  mobileDashBtn.addEventListener('touchend', (e) => { e.preventDefault(); keys.delete('ShiftLeft'); });
  mobilePauseBtn.addEventListener('touchstart', (e) => { e.preventDefault(); if(running && !gameOver) isPaused = !isPaused; });

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') { particles = []; trails = []; bullets = []; rainbowBalls = []; }
  });

  showMenuForModeSelection(); requestAnimationFrame(gameLoop);
</script>
</body>
</html>
